 samples in the batch, so it cannot certify MI larger than log of the batch size", "d": ["It can only estimate MI for discrete variables with at most N states", "It overestimates MI without bound, giving values far above the true MI", "It requires N → 1 to be valid, so larger batches break the estimate"], "x": "InfoNCE is a lower bound on MI that saturates at log N; when true MI exceeds log N the bound is loose, so large MI needs huge batches (or other estimators)."}, {"m": "6D", "c": "Concept", "q": "MINE (Donsker-Varadhan) vs. NWJ vs. InfoNCE trade off bias and variance. Which statement captures a key trade-off?", "a": "DV/MINE can have high variance (and bias from the log-of-expectation estimated with minibatches), while InfoNCE is low-variance but biased low, capped at log N", "d": ["All three are unbiased and have identical, zero variance", "InfoNCE has unbounded variance while DV is always exactly unbiased", "NWJ is the only estimator that is biased; DV and InfoNCE are both exact"], "x": "There is a bias-variance tension: DV/MINE pursue tightness but suffer high variance and finite-batch bias; InfoNCE is stable and low-variance but systematically underestimates large MI (≤ log N)."}, {"m": "6D", "c": "Weakness", "q": "What is the central point of the Tschannen et al. critique of MI-maximization for representation learning?", "a": "The success of contrastive methods is not well explained by the amount of MI estimated; tighter MI estimators can give worse representations, so inductive biases (encoder architecture, the critic) matter more than the MI value itself", "d": ["They proved that maximizing MI always yields optimal representations regardless of architecture", "They showed InfoNCE exactly computes the true mutual information", "They argued MI estimation is irrelevant because all encoders perform identically"], "x": "Tschannen et al. ('On Mutual Information Maximization for Representation Learning') showed downstream performance doesn't track estimated MI, and that architectural/critic inductive biases, not MI magnitude, drive results."}, {"m": "6E", "c": "Equation", "q": "The VAE's negative ELBO can be read as a rate-distortion objective. Which decomposition is correct?", "a": "−ELBO = distortion + rate, where distortion = −E_q[log p(x|z)] (reconstruction cost) and rate = KL(q(z|x)‖p(z)) (bits to encode the latent)", "d": ["−ELBO = rate − distortion, the two terms subtracted to form the bound", "−ELBO = distortion only; the KL term is dropped in the rate-distortion view", "−ELBO = rate × distortion, a multiplicative trade-off"], "x": "The ELBO splits into a reconstruction (distortion) term and a KL (rate) term; minimizing −ELBO trades off latent code length (rate) against reconstruction error (distortion)."}, {"m": "6E", "c": "Concept", "q": "In β-VAE, the objective is distortion + β·rate. According to 'Fixing a Broken ELBO' (Alemi et al.), why does β matter for the rate-distortion plane?", "a": "Sweeping β traces out different achievable (rate, distortion) points; many models with the same ELBO sit at very different points, so β selects where on the R-D frontier you land (e.g. avoiding posterior collapse)", "d": ["β has no effect; all values of β give the same point on the R-D plane", "Increasing β always improves both rate and distortion simultaneously", "β only rescales the learning rate and is unrelated to rate or distortion"], "x": "Alemi et al. showed the standard ELBO is degenerate: equal ELBO can correspond to different (rate, distortion) trade-offs. Tuning β moves along the R-D frontier, controlling how much the latent is used vs. posterior collapse."}, {"m": "6E", "c": "Concept", "q": "What problem does 'bits-back' coding (e.g., BB-ANS) solve when using a latent-variable model for lossless compression?", "a": "It avoids paying the full cost of transmitting the latent z by recovering the bits used to sample z from the posterior, achieving a net code length close to the negative ELBO (the marginal description length)", "d": ["It makes the compression lossy in exchange for shorter codes", "It removes the need for any prior p(z), encoding only the data", "It only works for models without latent variables"], "x": "Bits-back uses already-available bits to sample z ~ q(z|x), 'getting them back' on the decoder side, so the effective rate approaches the ELBO; BB-ANS implements this with asymmetric numeral systems."}, {"m": "6E", "c": "Intuition", "q": "Learned (neural) image compression is often described as 'nonlinear transform coding'. What is the analogy to classical transform coding (e.g., JPEG)?", "a": "A learned encoder is a nonlinear analysis transform (replacing JPEG's fixed linear DCT) mapping the image to a latent that is quantized and entropy-coded, with a learned decoder as the synthesis transform; the rate term is the latent's estimated entropy", "d": ["It applies the exact same fixed DCT as JPEG but with a neural entropy coder bolted on", "It performs no transform at all and entropy-codes raw pixels directly", "It is linear, just with learned weights, and uses no quantization"], "x": "Neural compression generalizes transform coding: learned nonlinear analysis/synthesis transforms replace the fixed linear DCT, the latent is quantized and entropy-coded under a learned prior, and training minimizes rate (entropy) + λ·distortion."}, {"m": "6E", "c": "Weakness", "q": "Why is posterior collapse a failure mode in (β-)VAEs, in rate-distortion language?", "a": "The model drives the rate KL(q(z|x)‖p(z)) toward zero (latent carries no information about x) while a powerful decoder still reconstructs, so the latent code is unused — a low-rate, the encoder ignored", "d": ["The rate term explodes to infinity, making the code length unbounded", "The distortion term is forced to zero, giving perfect reconstruction for free", "It only occurs when β = 0 and never for any positive β"], "x": "Posterior collapse is the rate→0 corner: q(z|x) matches the prior so I(x;z)≈0, and an over-expressive decoder reconstructs without using z; raising/lowering β moves you off this degenerate R-D point."}];
const TF = [{"m": "0A", "q": "One bit is the information content of the answer to a yes/no question whose two outcomes are equally likely.", "a": true, "x": "This is the definition of the bit as a unit of information under log₂."}, {"m": "0A", "q": "Choosing the logarithm base only changes the units of information (bits vs nats vs bans), not the underlying quantity being measured.", "a": true, "x": "The base is just a scaling constant; switching bases rescales the numerical value but preserves all information-theoretic relationships."}, {"m": "0A", "q": "Information measured in nats uses log base 2.", "a": false, "x": "Nats use the natural log (ln, base e); log₂ gives bits."}, {"m": "0A", "q": "1 nat equals exactly 0.6931 bits.", "a": false, "x": "1 nat ≈ 1.4427 bits (that is log₂ e); 0.6931 is ln 2, the factor for converting bits to nats."}, {"m": "1A", "q": "Self-information h(x) = -log₂ p(x) is always non-negative for any valid probability p(x) ∈ (0,1].", "a": true, "x": "Since p(x) ≤ 1, log₂ p(x) ≤ 0, so -log₂ p(x) ≥ 0; surprise is never negative."}, {"m": "1A", "q": "Conditioning can increase entropy: there exist X, Y with H(X|Y) &gt; H(X).", "a": false, "x": "On average conditioning reduces entropy, H(X|Y) ≤ H(X). (A specific value H(X|Y=y) can exceed H(X), but the averaged conditional entropy cannot.)"}, {"m": "1A", "q": "For the chain rule, H(X,Y) = H(Y) + H(X|Y) is equally valid as H(X,Y) = H(X) + H(Y|X).", "a": true, "x": "The chain rule can be expanded in either order; both decompositions of the joint entropy are correct and equal."}, {"m": "1A", "q": "H(X) ≤ log₂|𝒳| can fail if X has many low-probability outcomes.", "a": false, "x": "The bound H(X) ≤ log₂|𝒳| holds for every distribution on a finite alphabet, with equality only for the uniform distribution."}, {"m": "1B", "q": "KL divergence is symmetric: D(p‖q) = D(q‖p) for all p, q.", "a": false, "x": "KL divergence is generally asymmetric; swapping the arguments usually changes the value, which is why it is not a metric."}, {"m": "1B", "q": "Mutual information I(X;Y) is always non-negative, and equals 0 iff X and Y are independent.", "a": true, "x": "Since I(X;Y) = D(p(x,y)‖p(x)p(y)) ≥ 0 by Gibbs, it is zero exactly when the joint factors into the product of marginals."}, {"m": "1B", "q": "The data-processing inequality says that cleverly processing Y can increase the information it carries about X.", "a": false, "x": "For X → Y → Z, I(X;Z) ≤ I(X;Y): processing can never create information about X, only preserve or destroy it."}, {"m": "1C", "q": "In the typical set, every sequence has roughly the same probability, approximately 2^(-nH).", "a": true, "x": "By the AEP, typical sequences satisfy -(1/n)log₂ p ≈ H, so p ≈ 2^(-nH); they are nearly equiprobable, hence 'equipartition'."}, {"m": "1C", "q": "For a non-uniform i.i.d. source, the typical set contains a large (non-vanishing) fraction of all length-n sequences.", "a": false, "x": "It contains ≈ 2^(nH) of the 2^(n·log₂|𝒳|) total sequences, a vanishing fraction when H &lt; log₂|𝒳|, yet it still carries almost all the probability."}, {"m": "1C", "q": "The entropy rate of a stationary Markov chain weights each state's transition entropy by the stationary probability of that state.", "a": true, "x": "The entropy rate is Σᵢ μᵢ H(row i): the stationary-distribution-weighted average of the per-state conditional entropies."}, {"m": "2A", "q": "Every prefix code is uniquely decodable.", "a": true, "x": "Prefix-freeness implies unique decodability (it's a strict subset); the converse is not guaranteed."}, {"m": "2A", "q": "If a set of codeword lengths satisfies the Kraft inequality, a prefix code with exactly those lengths must exist.", "a": true, "x": "Kraft's theorem is constructive: any lengths with Σ 2^(-lᵢ) ≤ 1 can be assigned to a prefix code."}, {"m": "2A", "q": "It is possible to build a uniquely-decodable binary code whose expected length is strictly below the source entropy H.", "a": false, "x": "L ≥ H always holds for uniquely-decodable codes; no code can compress below the entropy on average."}, {"m": "2A", "q": "A nonsingular code (all codewords distinct) is always uniquely decodable.", "a": false, "x": "Distinct codewords do not guarantee that concatenated streams parse uniquely; e.g. {0,1,01} is nonsingular but ambiguous."}, {"m": "2B", "q": "Huffman coding produces an optimal symbol code, but its expected length can still exceed the entropy by nearly 1 bit per symbol.", "a": true, "x": "Optimality is among symbol codes; the integer-length gap can be almost 1 bit when probabilities are far from powers of 1/2."}, {"m": "2B", "q": "Huffman coding can assign a fractional number of bits to a very frequent symbol.", "a": false, "x": "Every Huffman codeword has an integer length of at least 1 bit; fractional bits require arithmetic/range coding."}, {"m": "2B", "q": "Block (extended) Huffman coding lets the per-symbol redundancy approach zero as the block size grows.", "a": true, "x": "Overhead is &lt; 1 bit per block, so dividing by block size n drives per-symbol redundancy below 1/n toward 0."}, {"m": "2C", "q": "Arithmetic coding can use a fractional number of bits per symbol on average.", "a": true, "x": "By encoding the whole message as one number in a subinterval, the per-symbol cost can be below 1 bit, matching entropy closely."}, {"m": "2C", "q": "Huffman coding always matches the source entropy exactly for any probability distribution.", "a": false, "x": "Huffman only matches entropy exactly when all probabilities are powers of ½; otherwise its integer-length codewords cost up to ~1 bit per symbol more."}, {"m": "2C", "q": "In an adaptive arithmetic coder, the probability table must be transmitted to the decoder up front.", "a": false, "x": "The decoder rebuilds the same model from already-decoded symbols, so no table needs to be sent — both sides stay synchronized."}, {"m": "2C", "q": "Each symbol in arithmetic coding shrinks the current interval to a sub-range whose width is proportional to that symbol's probability.", "a": true, "x": "This proportional subdivision is exactly what makes the final interval width ≈ the message probability, giving the ≈ −log₂ p code length."}, {"m": "2D", "q": "LZ77 and LZ78 require the encoder to know the source's probability distribution in advance.", "a": false, "x": "LZ methods are universal and adaptive: they learn structure from the data itself and need no prior knowledge of source statistics."}, {"m": "2D", "q": "LZW was historically used in the GIF image format and the Unix 'compress' utility.", "a": true, "x": "LZW (a refinement of LZ78 by Welch) is the basis of GIF compression and the classic Unix compress tool; its patent history pushed PNG toward the patent-free DEFLATE instead."}, {"m": "2D", "q": "For a stationary ergodic source, the per-symbol code length of LZ coding converges to the entropy rate as the input grows arbitrarily long.", "a": true, "x": "This asymptotic optimality is exactly the universality property: the achieved rate approaches the entropy rate H without being told the source distribution."}, {"m": "2D", "q": "PNG uses the LZW algorithm for its lossless image compression.", "a": false, "x": "PNG uses DEFLATE (LZ77 + Huffman), not LZW; one motivation was to avoid the LZW patent that encumbered GIF."}, {"m": "3A", "q": "A BSC with crossover probability p = 1 (every bit is flipped) has zero capacity.", "a": false, "x": "A deterministic bit-flip is fully invertible: just complement every received bit. H₂(1)=0, so C = 1 - 0 = 1 bit per use."}, {"m": "3A", "q": "For a fixed channel p(y|x), capacity is maximized over the input distribution, not the channel law.", "a": true, "x": "The channel is given; the designer only controls the input distribution p(x), and capacity is the max of I(X;Y) over p(x)."}, {"m": "3A", "q": "The capacity-achieving input distribution for a symmetric channel like the BSC is the uniform distribution.", "a": true, "x": "By symmetry, the uniform input maximizes I(X;Y) for symmetric channels such as the BSC."}, {"m": "3A", "q": "The capacity of a BEC with erasure probability e is 1 - H₂(e).", "a": false, "x": "That is the BSC formula. The BEC capacity is simply C = 1 - e because erasures are detectable losses, not undetected flips."}, {"m": "3B", "q": "The achievability part of the theorem is typically proved nonconstructively, using a random codebook and averaging the error over all codebooks.", "a": true, "x": "Shannon's random coding argument shows the average error over random codebooks is small, so at least one good codebook must exist — without exhibiting it explicitly."}, {"m": "3B", "q": "If the transmission rate R exceeds the capacity C, increasing the block length n makes reliable communication possible.", "a": false, "x": "For R &gt; C the error probability is bounded away from zero no matter how large n is; longer blocks cannot rescue rates above capacity."}, {"m": "3B", "q": "Fano's inequality is the key tool used in the converse (the R ≤ C direction) of the coding theorem.", "a": true, "x": "Fano links a small error probability to small residual uncertainty H(W|Ŵ), which combined with data-processing yields R ≤ C for reliable codes."}, {"m": "3B", "q": "The capacity C is the maximum of I(X;Y) taken over all channel transition distributions p(y|x).", "a": false, "x": "The channel p(y|x) is fixed; capacity is the maximum of I(X;Y) over the INPUT distributions p(x), not over channels."}, {"m": "3C", "q": "Differential entropy h(X) can be negative.", "a": true, "x": "Unlike discrete entropy, h(X) can be negative — e.g. a uniform distribution on [0, a] has h = log₂ a, which is negative when a &lt; 1."}, {"m": "3C", "q": "Differential entropy is invariant under scaling: h(aX) = h(X) for any a ≠ 0.", "a": false, "x": "Scaling changes differential entropy: h(aX) = h(X) + log₂|a|. It is NOT scale-invariant, unlike discrete entropy."}, {"m": "3C", "q": "At high SNR, the AWGN capacity grows by about ½ bit per channel use for every doubling of SNR (a 3 dB increase).", "a": true, "x": "At high SNR, C ≈ ½ log₂(SNR), so doubling SNR adds ½ log₂ 2 = ½ bit per use; equivalently capacity rises ~1 bit per 6 dB."}, {"m": "3C", "q": "In water-filling, sub-channels with noise level above the water level ν are allocated zero power.", "a": true, "x": "Since Pᵢ = (ν − Nᵢ)⁺, any channel with Nᵢ ≥ ν receives no power — it is too noisy to be worth using."}, {"m": "4A", "q": "For a binary linear code, the minimum distance equals the minimum Hamming weight of any nonzero codeword.", "a": true, "x": "Because d(x,y) = weight(x−y) and x−y is itself a codeword by linearity, the minimum distance is the minimum nonzero weight."}, {"m": "4A", "q": "The generator matrix G and parity-check matrix H of the same linear code satisfy G·Hᵀ = 0.", "a": true, "x": "Every row of G is a codeword, and codewords have zero syndrome, so G·Hᵀ = 0 (equivalently H·Gᵀ = 0)."}, {"m": "4A", "q": "A code with minimum distance d = 4 can correct two errors.", "a": false, "x": "It corrects ⌊(4-1)/2⌋ = 1 error (and detects up to 3). Two-error correction needs d ≥ 5."}, {"m": "4A", "q": "In GF(2), subtraction is identical to addition.", "a": true, "x": "In GF(2) each element is its own additive inverse (1+1=0), so a−b = a+b = a XOR b."}, {"m": "4B", "q": "Reed-Solomon codes operate on multi-bit symbols from GF(2^m) rather than on individual bits.", "a": true, "x": "RS codes are defined over GF(q) with q = 2^m; each symbol is m bits, which is why a single symbol error can absorb a short bit-burst."}, {"m": "4B", "q": "A Reed-Solomon (n,k) code can correct any combination of e errors and f erasures as long as 2e + f ≤ n − k.", "a": true, "x": "The distance budget d−1 = n−k is split: each error costs 2 (location + value), each erasure costs 1 (value only)."}, {"m": "4B", "q": "In GF(2^m), the nonzero elements form a cyclic multiplicative group generated by a primitive element α.", "a": true, "x": "The 2^m − 1 nonzero elements are exactly the powers α^0, α^1, ..., α^(2^m−2) of a primitive element."}, {"m": "4B", "q": "The generator polynomial of a cyclic code of length n must divide x^n − 1.", "a": true, "x": "Codewords are polynomial multiples of g(x) modulo x^n − 1; for the code to be cyclic, g(x) must be a divisor of x^n − 1."}, {"m": "4C", "q": "The Viterbi algorithm's complexity grows exponentially with the message length.", "a": false, "x": "Viterbi complexity grows linearly with sequence length and exponentially only with the encoder memory (number of states), which is what makes it practical."}, {"m": "4C", "q": "The interleaver in a turbo code is essential to its performance, helping to decorrelate the two encoders' inputs and produce high-weight codewords.", "a": true, "x": "The interleaver scrambles bit order before the second encoder so that low-weight inputs to one encoder are spread out for the other, raising the minimum distance and breaking error correlation between decoders."}, {"m": "4C", "q": "Soft-decision Viterbi decoding generally performs worse than hard-decision Viterbi decoding.", "a": false, "x": "Soft-decision decoding uses the analog reliability of each sample (Euclidean distance) instead of just 0/1, giving roughly 2 dB of coding gain over hard decisions."}, {"m": "4C", "q": "Turbo codes can operate within a fraction of a decibel of the Shannon limit on the AWGN channel.", "a": true, "x": "This near-capacity performance, demonstrated by Berrou et al. in 1993, is the headline achievement of turbo codes and sparked the field of iterative (soft) decoding."}, {"m": "4D", "q": "For the binary erasure channel (BEC), density evolution gives a one-dimensional recursion whose fixed point determines the BP decoding threshold.", "a": true, "x": "On the BEC, BP messages are characterized by a single erasure probability, so density evolution reduces to a scalar recursion whose threshold separates successful from failed decoding."}, {"m": "4D", "q": "Sum-product belief propagation is guaranteed to converge to the exact ML codeword on any LDPC code with cycles.", "a": false, "x": "BP is exact only on cycle-free (tree) graphs. On practical LDPC codes the Tanner graph has cycles, so BP is an approximate algorithm that can fail or get stuck."}, {"m": "4D", "q": "EXIT (extrinsic information transfer) charts visualize the exchange of mutual information between the two component decoders to predict iterative decoding convergence.", "a": true, "x": "EXIT charts plot output vs input mutual information for each constituent decoder; a clear tunnel between the two curves indicates convergence to low error."}, {"m": "4D", "q": "In a polar code, information bits are placed on the synthesized subchannels that have become the most noisy (least reliable).", "a": false, "x": "It is the reverse: information bits go on the polarized 'good' (nearly noiseless) subchannels; the bad subchannels carry frozen (known) bits."}, {"m": "5A", "q": "For a Bernoulli(p) source under Hamming distortion with p ≤ 1/2, the rate-distortion function R(D) equals 0 for all D ≥ p.", "a": true, "x": "Once the allowed distortion D reaches p, you can output the all-zeros (or majority) sequence and incur expected distortion p, so no bits are needed; R(D)=H₂(p)−H₂(D) hits 0 at D=p."}, {"m": "5A", "q": "For a Gaussian source under squared error, reducing the allowed distortion D by a factor of 4 increases R(D) by exactly 1 bit.", "a": true, "x": "R(D)=½log₂(σ²/D); replacing D by D/4 adds ½log₂4 = ½·2 = 1 bit. (Each halving of D adds ½ bit.)"}, {"m": "5A", "q": "In reverse water-filling, source components with the largest variance are the ones left uncoded.", "a": false, "x": "It is the reverse: low-variance components below the water level λ are left uncoded; high-variance components are coded down to distortion λ."}, {"m": "5B", "q": "The error exponent for type-II error in Stein's lemma is D(q‖p), the KL divergence of the true distribution from the alternative.", "a": false, "x": "Stein's lemma gives the type-II error exponent as D(p‖q), with p the null/true distribution under H₁; the arguments are in that order, not reversed."}, {"m": "5B", "q": "The number of type classes of length-n sequences over a fixed finite alphabet grows only polynomially in n, while each type class can contain exponentially many sequences.", "a": true, "x": "There are at most (n+1)^|X| types (polynomial), yet a typical class has roughly 2^(nH(p)) sequences (exponential) — this gap drives method-of-types proofs."}, {"m": "5B", "q": "Higher Fisher information J(θ) allows an unbiased estimator to potentially achieve lower variance.", "a": true, "x": "The Cramér-Rao bound Var(θ̂) ≥ 1/J(θ) means larger Fisher information lowers the floor on achievable variance, permitting more precise estimates."}, {"m": "5C", "q": "In Slepian-Wolf coding, source X can be compressed all the way down to rate H(X|Y) even though encoder 1 never sees Y.", "a": true, "x": "With Y available at the joint decoder as side information, X needs only H(X|Y) bits — encoder 1 exploits the correlation through binning without ever observing Y."}, {"m": "5C", "q": "A multiple-access channel has multiple receivers, whereas a broadcast channel has multiple senders.", "a": false, "x": "It is reversed: the MAC has multiple senders and one receiver; the broadcast channel has one sender and multiple receivers."}, {"m": "6A", "q": "Minimizing cross-entropy with fixed one-hot labels is equivalent to minimizing the reverse KL divergence KL(q_model‖p_data).", "a": false, "x": "It is equivalent to minimizing the FORWARD KL(p_data‖q_model); cross-entropy H(p,q)=H(p)+KL(p‖q) and H(p) is constant for fixed labels."}, {"m": "6A", "q": "Under the maximum-entropy principle with linear moment (expected-feature) constraints, the resulting distribution always belongs to an exponential family.", "a": true, "x": "Maximizing entropy subject to E[fₖ]=cₖ via Lagrange multipliers yields q(x) ∝ exp(Σ λₖ fₖ(x)), the exponential-family form."}, {"m": "6B", "q": "In the two-part MDL code, a more complex model is always preferred because it lowers L(data|model).", "a": false, "x": "A complex model lowers L(data|model) but raises L(model); MDL minimizes the SUM, so extra complexity is only chosen if it pays for itself in compression."}, {"m": "6B", "q": "BIC's complexity penalty k·log n grows with the number of data points n, making it more conservative than AIC's 2k penalty for large datasets.", "a": true, "x": "Once n&gt;e²≈7.4, k·log n &gt; 2k, so BIC penalizes parameters more heavily than AIC and tends to pick simpler models as n grows."}, {"m": "6C", "q": "The deep Variational Information Bottleneck (VIB) estimates I(X;T) and I(T;Y) exactly using histogram binning of the activations.", "a": false, "x": "VIB uses variational BOUNDS (a lower bound on I(T;Y), an upper bound on I(X;T)) for tractability; exact binning-based MI is what the original IB-plane experiments used, and it is unreliable."}, {"m": "6C", "q": "Saxe et al. found that the IB compression phase can be an artifact of saturating nonlinearities and MI-binning, and need not appear with ReLU networks.", "a": true, "x": "Their work showed the compression phase depends on double-saturating activations (tanh) and the MI estimator; ReLU nets often generalize without any compression phase."}, {"m": "6D", "q": "InfoNCE provides a lower bound on mutual information that is capped at log N, where N is the number of samples (positives + negatives) used.", "a": true, "x": "InfoNCE saturates at log N, so it cannot certify MI larger than log of the batch size; large true MI requires very large N."}, {"m": "6D", "q": "The Tschannen et al. critique showed that using a tighter mutual-information lower bound always produces better learned representations.", "a": false, "x": "They showed the opposite: downstream quality does not track estimated MI, and tighter bounds can give worse representations; inductive biases matter more."}, {"m": "6E", "q": "The negative ELBO of a VAE can be decomposed into a distortion (reconstruction) term plus a rate (KL-to-prior) term.", "a": true, "x": "−ELBO = E_q[−log p(x|z)] (distortion) + KL(q(z|x)‖p(z)) (rate), giving a rate-distortion reading of the VAE objective."}, {"m": "6E", "q": "Bits-back coding (e.g., BB-ANS) makes lossless compression lossy in order to achieve shorter code lengths.", "a": false, "x": "Bits-back is a LOSSLESS scheme; it recovers the bits used to sample the latent so the effective rate approaches the negative ELBO without discarding information."}];

ach compression scheme/format to its key characteristic", "p": [["LZ77", "Sliding-window back-references as (offset, length)"], ["LZW", "Builds dictionary of phrases; basis of GIF and Unix compress"], ["DEFLATE", "LZ77 matching combined with Huffman entropy coding"], ["Universality", "Approaches entropy rate without knowing source statistics"]]}, {"m": "3A", "t": "Match each channel/quantity to its capacity or definition", "p": [["BSC, crossover p", "1 - H₂(p)"], ["BEC, erasure e", "1 - e"], ["General DMC capacity", "max over p(x) of I(X;Y)"], ["Blahut-Arimoto", "Iterative solver for capacity-achieving p(x)"]]}, {"m": "3B", "t": "Match each concept to its role in the coding theorem", "p": [["Random coding argument", "proves achievability of rates R &lt; C"], ["Fano's inequality", "key step in the converse, R ≤ C"], ["Jointly-typical decoding", "decoder rule used in achievability proof"], ["Capacity C", "max of I(X;Y) over input p(x)"]]}, {"m": "3C", "t": "Match each quantity to its expression or property", "p": [["h(X) for X ~ N(μ, σ²)", "½ log₂(2πe σ²)"], ["AWGN capacity per use", "½ log₂(1 + SNR)"], ["Shannon–Hartley capacity (bits/s)", "B log₂(1 + S/N)"], ["Water-filling power allocation", "Pᵢ = max(0, ν − Nᵢ)"]]}, {"m": "4A", "t": "Match each linear-code quantity to its description", "p": [["Generator matrix G", "Rows span the codeword subspace; encodes data into codewords"], ["Parity-check matrix H", "H·cᵀ = 0 for every codeword c; used to compute syndromes"], ["Syndrome s", "H·rᵀ; identifies the error coset, zero if no detectable error"], ["Minimum distance d", "Smallest Hamming weight among nonzero codewords"]]}, {"m": "4B", "t": "Match each coding term to its meaning", "p": [["MDS code", "Meets the Singleton bound: d = n − k + 1"], ["Berlekamp-Massey", "Finds the error-locator polynomial from syndromes"], ["Cyclic code", "Closed under cyclic shifts; codewords are multiples of g(x)"], ["Erasure", "Symbol whose location is known but value is lost"]]}, {"m": "4C", "t": "Match each algorithm or component to its role", "p": [["Viterbi", "Maximum-likelihood sequence decoding via survivor paths"], ["BCJR", "Per-bit MAP soft-output decoding (α, β, γ recursions)"], ["Interleaver", "Permutes bits between the two turbo encoders"], ["Trellis", "Time-unrolled state diagram of the encoder"]]}, {"m": "4D", "t": "Match each coding concept to its description", "p": [["Tanner graph", "Bipartite graph linking bit nodes to parity-check nodes"], ["Density evolution", "Tracks BP message distributions to find the noise threshold"], ["Channel polarization", "Synthesizes nearly-perfect and nearly-useless subchannels"], ["LT / fountain code", "Rateless: decode from any ≈k received symbols"]]}, {"m": "5A", "t": "Match each source/distortion setting to its rate-distortion function R(D)", "p": [["Bernoulli(p) source, Hamming distortion, 0≤D≤p", "H₂(p) − H₂(D)"], ["Gaussian N(0,σ²), squared error, 0≤D≤σ²", "½ log₂(σ²/D)"], ["Any source at D = 0 (lossless limit)", "H(X)"], ["Distortion D exceeding the source spread (e.g. D ≥ p or D ≥ σ²)", "0"]]}, {"m": "5B", "t": "Match each information-theoretic quantity to the statistical result it governs", "p": [["Type-II error exponent (Stein's lemma)", "D(p‖q)"], ["Probability of a rare empirical type (Sanov)", "D(p*‖q) at the I-projection"], ["Lower bound on unbiased estimator variance", "1/J(θ) (Cramér-Rao)"], ["Number of type classes, length n", "polynomial (n+1)^|X|"]]}, {"m": "5C", "t": "Match each network coding scenario to its key rate constraint", "p": [["Slepian-Wolf, source X", "R₁ ≥ H(X|Y)"], ["Slepian-Wolf, total rate", "R₁+R₂ ≥ H(X,Y)"], ["MAC, sum rate", "R₁+R₂ ≤ I(X₁,X₂;Y)"], ["Broadcast channel", "one sender → many receivers"]]}, {"m": "6A", "t": "Match each information-theoretic quantity to what it represents in classification training", "p": [["Cross-entropy H(p,q)", "The loss minimized when training with log-likelihood and labels p"], ["KL(p̂‖q_θ)", "What MLE minimizes (empirical-to-model divergence)"], ["Label smoothing", "Raises target entropy to reduce over-confidence"], ["Maximum-entropy model", "Softmax / logistic regression as an exponential-family distribution"]]}, {"m": "6B", "t": "Match each model-selection idea to its description", "p": [["Two-part code", "L(model) + L(data|model)"], ["BIC penalty", "k·log n added to −2 log L̂"], ["Kolmogorov complexity", "Uncomputable shortest-program ideal that MDL approximates"], ["Bits-back", "Recovers bits 'wasted' in choosing latents/parameters"]]}, {"m": "6D", "t": "Match each mutual-information estimator/bound to its key feature", "p": [["Donsker-Varadhan / MINE", "Neural critic maximizing a tight but high-variance lower bound"], ["InfoNCE", "Low-variance contrastive bound capped at log N"], ["NWJ (f-GAN style)", "Lower bound using e^{T−1}, an unbiased estimator of the bound"], ["Tschannen critique", "Downstream quality does not track estimated MI"]]}, {"m": "6E", "t": "Match each term/method to its role in neural compression and VAEs", "p": [["Rate", "KL(q(z|x)‖p(z)), bits to encode the latent"], ["Distortion", "−E_q[log p(x|z)], reconstruction cost"], ["β-VAE", "Sweeps the rate-distortion frontier via β"], ["Nonlinear transform coding", "Learned analysis/synthesis transforms + quantized entropy-coded latent"]]}];
const FC = [{"m": "0A", "front": "What is a 'bit' as a unit of information?", "back": "The information gained from answering one yes/no question with two equally likely outcomes.\nIt is the natural unit when uncertainty is measured with log₂."}, {"m": "0A", "front": "Log base ↔ information unit", "back": "log₂ → bits\nln (base e) → nats\nlog₁₀ → bans (hartleys)"}, {"m": "0A", "front": "How many bits is 1 nat? (and how to convert)", "back": "1 nat = log₂(e) ≈ 1.4427 bits.\nbits → nats: multiply by ln2 ≈ 0.6931.\nnats → bits: multiply by 1.4427."}, {"m": "0A", "front": "What are the three pillars of the course?", "back": "1. Classical core: entropy, mutual information, channel capacity.\n2. Practical coding: compression + error correction.\n3. Information theory for machine learning."}, {"m": "0A", "front": "Why measure uncertainty in bits?", "back": "Because the number of bits equals the average number of optimal yes/no questions needed to identify an outcome — exactly what log₂ counts."}, {"m": "1A", "front": "Define self-information h(x) and state its intuition.", "back": "h(x) = -log₂ p(x)\nMeasures the 'surprise' of outcome x: rarer outcomes (small p) carry more information. Measured in bits when using log₂."}, {"m": "1A", "front": "Write the formula for entropy H(X) and say what it averages.", "back": "H(X) = Σ p(x)·(-log₂ p(x)) = E[h(X)]\nIt is the expected self-information — the average surprise per symbol."}, {"m": "1A", "front": "State the chain rule for the joint entropy of X and Y.", "back": "H(X,Y) = H(X) + H(Y|X) = H(Y) + H(X|Y)\nJoint uncertainty = uncertainty of one variable + remaining uncertainty of the other given the first."}, {"m": "1A", "front": "Binary entropy H₂(p): where is it maximized and what is its max value?", "back": "H₂(p) = -p·log₂p - (1-p)·log₂(1-p)\nMaximized at p = ½, giving H₂(½) = 1 bit. It is 0 at p = 0 and p = 1."}, {"m": "1A", "front": "State the bound H(X) ≤ log₂|𝒳| and its equality condition. What does 'conditioning reduces entropy' mean?", "back": "H(X) ≤ log₂|𝒳|, equality iff X is uniform.\nConditioning reduces entropy: H(X|Y) ≤ H(X), equality iff X ⊥ Y."}, {"m": "1B", "front": "Define KL divergence D(p‖q) and state its two key properties.", "back": "D(p‖q) = Σ p(x)·log₂(p(x)/q(x))\n1) D(p‖q) ≥ 0 (Gibbs), = 0 iff p = q.\n2) Asymmetric: D(p‖q) ≠ D(q‖p) in general. Not a metric."}, {"m": "1B", "front": "How is cross-entropy related to entropy and KL divergence?", "back": "Cross-entropy(p, q) = H(p) + D(p‖q)\nExpected bits to code p-data with a q-optimal code; the extra D(p‖q) is the mismatch penalty."}, {"m": "1B", "front": "Give the equivalent expressions for mutual information I(X;Y).", "back": "I(X;Y) = H(X) - H(X|Y) = H(Y) - H(Y|X)\n= H(X) + H(Y) - H(X,Y)\n= D(p(x,y)‖p(x)p(y)) ≥ 0"}, {"m": "1B", "front": "State the data-processing inequality and the role of Jensen's inequality.", "back": "For X → Y → Z: I(X;Z) ≤ I(X;Y). Processing can't create information.\nJensen: for convex -log, E[-log(·)] ≥ -log E[·], which yields D(p‖q) ≥ 0."}, {"m": "1C", "front": "State the AEP (Asymptotic Equipartition Property).", "back": "For i.i.d. X₁..Xₙ: -(1/n)·log₂ p(x₁..xₙ) → H(X) in probability.\nTypical sequences each have probability ≈ 2^(-nH)."}, {"m": "1C", "front": "Describe the typical set: its size and the probability it carries.", "back": "Size ≈ 2^(nH); total probability → 1.\nIt is a vanishing fraction of all |𝒳|ⁿ = 2^(n·log₂|𝒳|) sequences (when H &lt; log₂|𝒳|) yet holds almost all the probability."}, {"m": "1C", "front": "Give the formula for the entropy rate of a stationary Markov chain.", "back": "H = Σᵢ μᵢ · H(row i)\nwhere μ is the stationary distribution and H(row i) is the entropy of the transition distribution from state i."}, {"m": "1C", "front": "What is the entropy rate of an i.i.d. process?", "back": "H = H(X), the entropy of a single symbol.\nFor i.i.d. sources H(X₁..Xₙ) = n·H(X), so the per-symbol rate is just H(X)."}, {"m": "2A", "front": "State the Kraft inequality and what it guarantees.", "back": "Σ 2^(-lᵢ) ≤ 1 (binary).\nIf satisfied, a prefix code with those lengths exists.\nMcMillan: all uniquely-decodable codes also obey it."}, {"m": "2A", "front": "Order the three code classes from least to most restrictive.", "back": "Nonsingular ⊃ Uniquely decodable ⊃ Prefix (instantaneous).\nEach is a strict subset of the previous."}, {"m": "2A", "front": "What are Shannon code lengths and the resulting bound on L?", "back": "lᵢ = ⌈log₂(1/pᵢ)⌉.\nGives H ≤ L &lt; H + 1 (within one bit of entropy)."}, {"m": "2A", "front": "Why is L ≥ H, and when is equality achieved?", "back": "Source coding theorem: no uniquely-decodable code beats entropy on average.\nEquality iff every pᵢ is a power of 1/2 (dyadic), so lᵢ = log₂ 1/pᵢ is an integer."}, {"m": "2A", "front": "Give an example of a nonsingular code that is NOT uniquely decodable.", "back": "{0, 1, 01}: all distinct, but '01' could be parsed as '01' or as '0','1'."}, {"m": "2B", "front": "Describe the Huffman merge rule.", "back": "Greedy bottom-up: repeatedly merge the two least-probable nodes into a parent (sum their probabilities) until one tree remains."}, {"m": "2B", "front": "In what sense is Huffman optimal?", "back": "Minimum expected length among all symbol (per-symbol) prefix codes for a given distribution.\nNot optimal vs arithmetic coding."}, {"m": "2B", "front": "What is Huffman's integer-length limitation and its fix?", "back": "Each symbol needs ≥ 1 whole bit, so it can't match log₂ 1/p for skewed sources.\nFix: block/extended Huffman over n-symbol groups (overhead &lt; 1/n)."}, {"m": "2B", "front": "Huffman expected length vs entropy bound?", "back": "H ≤ L &lt; H + 1.\nGap → 0 as block size grows; large for highly skewed two-symbol sources."}, {"m": "2B", "front": "Why does plain Huffman fail on p=0.99/0.01 source?", "back": "Two symbols force 1 bit each (L=1), but H ≈ 0.08 bits/symbol.\nNeed block or arithmetic coding to approach entropy."}, {"m": "2C", "front": "How does arithmetic coding represent an entire message?", "back": "As a single number lying within a subinterval of [0,1).\nThe interval is narrowed symbol by symbol; the width of the final interval ≈ the message's probability."}, {"m": "2C", "front": "Code length achieved by arithmetic coding for a message of probability p", "back": "≈ −log₂ p bits.\nOverhead is a small constant (≈2 bits) for the whole stream, not per symbol — so it approaches the entropy bound."}, {"m": "2C", "front": "Why does arithmetic coding beat Huffman on skewed/adaptive sources?", "back": "No per-symbol integer rounding: it can spend a fraction of a bit per symbol.\nHuffman's minimum codeword is 1 bit, wasting nearly a bit when a symbol has p close to 1."}, {"m": "2C", "front": "What makes adaptive arithmetic coding possible without sending a probability table?", "back": "Encoder and decoder update the model identically, using only symbols already processed.\nThis keeps them synchronized and lets the model track non-stationary sources."}, {"m": "2C", "front": "Range coding vs classic arithmetic coding", "back": "Range coding = arithmetic coding on a large integer range with byte-oriented renormalization.\nNearly identical compression, but faster/simpler on byte-based machines; emits whole bytes instead of single bits."}, {"m": "2D", "front": "What is dictionary coding?", "back": "A compression approach that replaces repeated substrings with short references into a dictionary of previously seen data.\nThe dictionary is built adaptively from the input itself (LZ family), so no preset code table is needed."}, {"m": "2D", "front": "LZ77: what is the sliding window and what does a token look like?", "back": "Sliding window = a bounded buffer of recently seen bytes used as the dictionary.\nToken = (offset, length, next symbol): copy 'length' bytes starting 'offset' positions back, then output the next literal.\nMatch offsets are limited to the window size."}, {"m": "2D", "front": "LZ78 / LZW: how is the dictionary grown?", "back": "LZ78: parse input into phrases; each new phrase = a previously stored phrase + one new symbol, added as a new entry.\nLZW: start with all single symbols, emit the code for the longest match, then add (matched phrase + next symbol) to the dictionary.\nNo explicit window; the dictionary accumulates phrases."}, {"m": "2D", "front": "What does 'universality' mean for LZ compression?", "back": "For a stationary ergodic source, the achieved rate → the entropy rate H as input length → ∞.\nKey point: this happens WITHOUT knowing the source distribution in advance.\nLZ adapts to the data, so it is asymptotically optimal for a broad class of sources."}, {"m": "2D", "front": "Where are LZ algorithms used in the real world?", "back": "gzip / zlib / zip / PNG → DEFLATE = LZ77 + Huffman coding.\nGIF and Unix 'compress' → LZW (an LZ78 variant).\nPNG chose DEFLATE over LZW partly to avoid the LZW patent."}, {"m": "3A", "front": "Define the capacity of a discrete memoryless channel.", "back": "C = max over input distributions p(x) of I(X;Y).\nUnits: bits per channel use.\nThe channel law p(y|x) is fixed; you optimize the input."}, {"m": "3A", "front": "BSC capacity formula and its meaning.", "back": "C = 1 - H₂(p) for crossover probability p.\nH₂(p) = -p log₂ p - (1-p) log₂(1-p) is the bits of uncertainty injected per use.\nC = 0 at p = 1/2; C = 1 at p = 0 or 1."}, {"m": "3A", "front": "BEC capacity formula and intuition.", "back": "C = 1 - e for erasure probability e.\nFraction e of symbols are erased (known losses), so only fraction (1-e) get through.\nErasures are easier than flips: no 1 - H₂(e) penalty."}, {"m": "3A", "front": "What does the Blahut-Arimoto algorithm do?", "back": "Numerically computes channel capacity by iteratively finding the capacity-achieving input distribution p(x).\nAlternates updating p(x) and the reverse channel p(x|y); converges monotonically to C."}, {"m": "3A", "front": "Why is a uniform input optimal for the BSC?", "back": "The BSC is symmetric in its inputs.\nFor symmetric channels, the uniform input distribution maximizes I(X;Y), making the output uniform and achieving capacity."}, {"m": "3B", "front": "Define the rate R of a block code with M codewords and block length n.", "back": "R = log₂(M)/n bits per channel use.\nlog₂(M) = number of message bits; n = channel uses per codeword."}, {"m": "3B", "front": "State the noisy-channel coding theorem (both directions).", "back": "Achievability: for any R &lt; C there exist codes with error → 0 as n → ∞.\nConverse: for any R &gt; C, error is bounded away from 0.\nReliable communication is possible iff R &lt; C."}, {"m": "3B", "front": "What is the random coding argument and why is it nonconstructive?", "back": "Generate codewords i.i.d. from the capacity-achieving p(x); average error over the random ensemble → 0 for R &lt; C.\nIf the AVERAGE codebook is good, at least one specific codebook is good — but the proof never builds it explicitly."}, {"m": "3B", "front": "How does jointly-typical decoding work, and what causes errors?", "back": "Decode to the unique codeword xⁿ that is jointly typical with received yⁿ.\nErrors: (1) the true pair isn't jointly typical (rare by AEP), or (2) a wrong codeword is also jointly typical (probability ≈ 2^(−n(I(X;Y)−R)), small when R &lt; I(X;Y))."}, {"m": "3B", "front": "State Fano's inequality and its role in the converse.", "back": "H(W|Ŵ) ≤ H(Pₑ) + Pₑ·log₂(|W|−1) ≤ 1 + Pₑ·log₂(M).\nA small error probability Pₑ forces small residual uncertainty; combined with I(W;Ŵ) ≤ nC this yields R ≤ C for reliable communication."}, {"m": "3C", "front": "Why can differential entropy be negative while discrete entropy cannot?", "back": "Discrete entropy sums −p log p with 0 ≤ p ≤ 1, so each term is ≥ 0.\nDifferential entropy integrates −f log f, but a density f can exceed 1 (it's a density, not a probability), making log f positive and the integral negative.\nExample: Uniform on [0, ½] has h = log₂(½) = −1 bit."}, {"m": "3C", "front": "State the maximum-entropy property of the Gaussian.", "back": "Among all continuous distributions with a fixed variance σ², the Gaussian N(μ, σ²) maximizes differential entropy.\nMax value: h = ½ log₂(2πe σ²).\nConsequence: Gaussian noise is the 'worst case' — it gives the smallest capacity for a given noise power."}, {"m": "3C", "front": "Write the AWGN channel capacity and define each symbol.", "back": "C = ½ log₂(1 + SNR) bits per channel use.\nSNR = P/N, where P = average signal (input) power and N = noise variance.\nAchieved by a Gaussian input X ~ N(0, P)."}, {"m": "3C", "front": "State the Shannon–Hartley theorem and how it relates to the per-use formula.", "back": "C = B log₂(1 + S/N) bits per second.\nB = bandwidth (Hz), S = signal power, N = noise power (N = N₀B).\nLink: a bandwidth-B channel gives 2B real samples/s; each contributes ½ log₂(1+SNR) bits, so 2B · ½ log₂(1+SNR) = B log₂(1+SNR)."}, {"m": "3C", "front": "Describe the water-filling solution for parallel Gaussian channels.", "back": "Goal: maximize Σ ½ log₂(1 + Pᵢ/Nᵢ) subject to Σ Pᵢ ≤ P.\nSolution: Pᵢ = (ν − Nᵢ)⁺ = max(0, ν − Nᵢ).\nPicture: pour water (power) over a floor of heights Nᵢ; water level ν is chosen so total power = P. Low-noise channels get more power; channels with Nᵢ ≥ ν get none."}, {"m": "4A", "front": "What does GF(2) arithmetic look like (addition and multiplication)?", "back": "Addition = XOR: 0+0=0, 1+1=0, 0+1=1.\nMultiplication = AND: 1·1=1, else 0.\nEach element is its own additive inverse."}, {"m": "4A", "front": "How does a systematic generator matrix G = [I | P] relate to H?", "back": "If G = [I_k | P] then H = [Pᵀ | I_(n−k)] over GF(2).\nThis guarantees G·Hᵀ = 0."}, {"m": "4A", "front": "Steps of syndrome decoding", "back": "1. Compute s = H·rᵀ.\n2. If s = 0, accept r as a codeword.\n3. Else look up the coset leader (most likely error e) with that syndrome.\n4. Decode as r − e."}, {"m": "4A", "front": "Why does the Hamming(7,4) code correct exactly one error?", "back": "Its minimum distance is d = 3, so t = ⌊(3-1)/2⌋ = 1.\nEach nonzero syndrome (3 bits) points to one of 7 error positions."}, {"m": "4A", "front": "State the Hamming / sphere-packing bound and what 'perfect' means", "back": "2^k · Σ_{i=0}^{t} C(n,i) ≤ 2^n.\nA perfect code meets it with equality: radius-t balls exactly tile GF(2)ⁿ. Hamming and Golay codes are perfect."}, {"m": "4B", "front": "How is GF(2^m) constructed?", "back": "Polynomials over GF(2) of degree &lt; m, with multiplication reduced modulo a fixed irreducible degree-m polynomial.\n2^m elements; nonzero ones are powers of a primitive α."}, {"m": "4B", "front": "What is the Singleton bound and what does MDS mean?", "back": "Singleton: d ≤ n − k + 1.\nMDS (Maximum Distance Separable) codes meet it with equality — Reed-Solomon codes are MDS."}, {"m": "4B", "front": "Reed-Solomon as polynomial evaluation", "back": "Treat k message symbols as a degree-&lt;k polynomial p(x); the codeword is p evaluated at n distinct field points.\nAny k of the n evaluations uniquely recover p."}, {"m": "4B", "front": "Error vs erasure correction budget for RS(n,k)", "back": "d − 1 = n − k.\nErrors cost 2 each (location + value), erasures cost 1 each.\nCorrect if 2·errors + erasures ≤ n − k."}, {"m": "4B", "front": "What does Berlekamp-Massey do in BCH/RS decoding?", "back": "Given the syndromes, it finds the shortest LFSR / error-locator polynomial σ(x).\nIts roots locate the errors; then values are found (e.g. Forney)."}, {"m": "4C", "front": "What is the trellis of a convolutional code?", "back": "A time-indexed graph that unrolls the encoder's state diagram: each column is the set of encoder states at one time step, and edges (branches) show allowed state transitions, each labeled with the input bit and the corresponding output bits. Decoding = finding a path through the trellis."}, {"m": "4C", "front": "State the core idea of the Viterbi algorithm.", "back": "Dynamic programming on the trellis:\n- At each state keep only the single best (lowest-metric) incoming path = the survivor.\n- Add branch metrics, compare, and select (add-compare-select).\n- Trace back the final best survivor to recover the ML sequence.\nLinear in length, exponential in memory."}, {"m": "4C", "front": "What does SISO mean, and why does turbo decoding need it?", "back": "SISO = Soft-In/Soft-Out decoder. It takes soft (probabilistic, LLR) inputs and produces soft outputs (posterior/extrinsic LLRs) rather than hard bits. Turbo decoding needs SISO components (e.g. BCJR) so the two decoders can iteratively exchange reliability information instead of discarding it."}, {"m": "4C", "front": "Define the extrinsic information exchanged in turbo decoding.", "back": "For each bit, extrinsic info is the new soft belief a decoder produces about that bit using the code constraints and OTHER bits' info, EXCLUDING the channel value and a priori input for that bit itself. Passing only extrinsic info (as LLRs) prevents a decoder from re-feeding its own prior belief, which keeps the iteration from collapsing."}, {"m": "4C", "front": "Why are recursive (feedback) convolutional encoders used in turbo codes?", "back": "Recursive systematic convolutional (RSC) encoders turn most low-weight inputs into infinite/high-weight output sequences. Combined with the interleaver, this ensures that input patterns producing low-weight output in one encoder produce high-weight output in the other, raising the overall minimum distance and giving the steep BER 'waterfall'."}, {"m": "4D", "front": "LDPC code: what does the parity-check matrix H look like and how is it decoded?", "back": "H is sparse (low-density): few 1s, small constant row/column weight even as n grows.\nDecoded with iterative belief-propagation (sum-product) message passing on the Tanner graph.\nApproaches the Shannon limit for long block lengths."}, {"m": "4D", "front": "Tanner graph — definition and why it matters", "back": "Bipartite graph: variable (bit) nodes on one side, check nodes on the other; edge when H[i,j]=1.\nBP messages flow along edges.\nGirth (shortest cycle) matters: short cycles hurt BP; trees give exact marginals."}, {"m": "4D", "front": "Sum-product (belief-propagation) decoding — what messages and what guarantee?", "back": "Iteratively passes beliefs (e.g. log-likelihood ratios) between variable and check nodes.\nVariable nodes combine incoming evidence; check nodes enforce parity constraints.\nExact marginals only on cycle-free graphs; approximate on loopy LDPC graphs."}, {"m": "4D", "front": "Density evolution &amp; the BEC threshold", "back": "Density evolution: tracks the probability distribution of BP messages across iterations for an infinite-length code ensemble.\nThreshold = worst channel noise for which error → 0.\nOn the BEC it collapses to a scalar erasure-probability recursion (a single fixed-point analysis)."}, {"m": "4D", "front": "Polar codes — polarization, bit placement, and key trait", "back": "Recursive channel combining + splitting polarizes subchannels toward perfect or useless as N → ∞.\nInformation bits on good subchannels; frozen (known) bits on bad ones.\nFirst codes proven to achieve capacity with low-complexity (successive-cancellation) decoding."}, {"m": "5A", "front": "Define the rate-distortion function R(D).", "back": "The minimum rate (bits/symbol) needed to encode a source so that the expected distortion of the reconstruction is ≤ D.\nFormally R(D) = min I(X;X̂) over conditional distributions p(x̂|x) with E[d(X,X̂)] ≤ D."}, {"m": "5A", "front": "R(D) for a Bernoulli(p) source under Hamming distortion (p ≤ 1/2).", "back": "R(D) = H₂(p) − H₂(D) for 0 ≤ D ≤ p, and R(D) = 0 for D ≥ p.\n(H₂ is the binary entropy function.)"}, {"m": "5A", "front": "R(D) for a Gaussian source N(0,σ²) under squared-error distortion.", "back": "R(D) = ½ log₂(σ²/D) for 0 ≤ D ≤ σ², and R(D) = 0 for D ≥ σ².\nEach halving of D costs ½ bit."}, {"m": "5A", "front": "What is reverse water-filling?", "back": "For parallel independent Gaussian sources, choose a water level λ and set distortion Dᵢ = min(λ, σᵢ²).\nComponents with σᵢ² &lt; λ are left uncoded (Dᵢ = σᵢ²); louder ones are coded down to distortion λ. λ is set so Σ Dᵢ = D."}, {"m": "5A", "front": "How does lossy compression relate to lossless?", "back": "Lossless needs R ≥ H(X) for exact recovery. Lossy tolerates distortion D &gt; 0 and can use R(D) &lt; H(X).\nLossless is the limiting case D → 0, where R(D) → H(X)."}, {"m": "5B", "front": "What is a type (and a type class) in the method of types?", "back": "A type is the empirical distribution (symbol frequencies) of a length-n sequence.\nA type class is the set of all sequences sharing that type. There are only ≤ (n+1)^|X| types (polynomial), each class holding ≈ 2^(nH) sequences."}, {"m": "5B", "front": "State Sanov's theorem.", "back": "For i.i.d. samples from q, the probability that the empirical type lands in a set E decays as ≈ 2^(−nD(p*‖q)),\nwhere p* (the I-projection) is the member of E minimizing D(·‖q)."}, {"m": "5B", "front": "State Stein's lemma (binary hypothesis testing).", "back": "Testing H₁:p vs H₂:q. Holding the type-I error below ε, the best type-II error exponent is D(p‖q).\nThe type-II error decays as 2^(−nD(p‖q))."}, {"m": "5B", "front": "State the Cramér-Rao bound and the role of Fisher information.", "back": "For any unbiased estimator θ̂: Var(θ̂) ≥ 1/J(θ), where J(θ) is the Fisher information.\nMore Fisher information ⇒ lower achievable variance ⇒ more precise estimation."}, {"m": "5B", "front": "How is KL divergence D(p‖q) expressed as a likelihood ratio?", "back": "D(p‖q) = E_p[log₂(p(X)/q(X))] = Σ p(x) log₂(p(x)/q(x)).\nIt is the expected log-likelihood ratio under the true distribution p — the basis of its hypothesis-testing meaning."}, {"m": "5C", "front": "State the Slepian-Wolf rate region for correlated sources X, Y.", "back": "R₁ ≥ H(X|Y)\nR₂ ≥ H(Y|X)\nR₁ + R₂ ≥ H(X,Y)\nSeparate encoding + joint decoding achieves the joint entropy."}, {"m": "5C", "front": "Why is the Slepian-Wolf theorem surprising?", "back": "Two encoders that never see each other's data still achieve total rate H(X,Y) — the same as a single joint encoder.\nDistributed encoding pays no rate penalty when decoding is joint (via random binning)."}, {"m": "5C", "front": "What bounds define the two-user MAC capacity region?", "back": "R₁ ≤ I(X₁;Y | X₂)\nR₂ ≤ I(X₂;Y | X₁)\nR₁ + R₂ ≤ I(X₁,X₂ ; Y)\n(Multiple senders → one receiver.)"}, {"m": "5C", "front": "Contrast the multiple-access channel and the broadcast channel.", "back": "MAC: many senders → one receiver (capacity region known, a pentagon).\nBroadcast: one sender → many receivers, generally distinct messages (uses superposition coding). They are duals."}, {"m": "6A", "front": "Why is minimizing cross-entropy the same as minimizing KL for fixed labels?", "back": "H(p,q) = H(p) + KL(p‖q).\nWith labels p fixed, H(p) is constant, so minimizing cross-entropy H(p,q) minimizes the forward KL(p‖q)."}, {"m": "6A", "front": "MLE as an information-theoretic objective", "back": "Maximizing average log-likelihood = minimizing cross-entropy of empirical p̂ vs model q_θ\n= minimizing KL(p̂‖q_θ) (since H(p̂) is constant)."}, {"m": "6A", "front": "Maximum-entropy principle → which distribution family?", "back": "Among all distributions matching given expected-feature constraints E[fₖ], pick the highest-entropy one.\nResult: exponential family q(x) ∝ exp(Σ λₖ fₖ(x)), λₖ = Lagrange multipliers.\nSoftmax/logistic regression are maxent conditional models."}, {"m": "6A", "front": "What does label smoothing do, information-theoretically?", "back": "Replaces one-hot target with (1−ε) on true class, ε spread elsewhere → higher target entropy.\nPenalizes over-confident logits, improving calibration; acts as a regularizer."}, {"m": "6A", "front": "Forward KL(p‖q) vs reverse KL(q‖p) behavior", "back": "Forward KL(p‖q) (MLE/cross-entropy): mean-seeking / zero-avoiding → q covers all modes of p.\nReverse KL(q‖p): mode-seeking → q locks onto one mode."}, {"m": "6B", "front": "MDL two-part code: what is minimized?", "back": "L(model) + L(data | model).\nFirst term = complexity cost, second = fit/residual cost.\nMinimizing the sum balances fit vs complexity (Occam's razor in bits)."}, {"m": "6B", "front": "BIC formula and its penalty", "back": "BIC = −2 log L̂ + k·log n (k params, n data points).\nPenalty k·log n grows with n → more conservative than AIC's fixed 2k for large n.\nBIC ≈ Laplace approximation to the Bayesian marginal likelihood."}, {"m": "6B", "front": "MDL and Kolmogorov complexity", "back": "Kolmogorov complexity = length of shortest program reproducing the data (idealized description length).\nIt is uncomputable, so MDL approximates it using a restricted, computable model/code class."}, {"m": "6B", "front": "What is the bits-back idea?", "back": "The bits used to choose specific latents/parameters from a posterior aren't truly wasted — they can be recovered.\nThis lowers the effective code length from the naive two-part code toward the Bayesian marginal / variational free energy."}, {"m": "6C", "front": "Information Bottleneck Lagrangian", "back": "min  I(X;T) − β·I(T;Y).\nI(X;T): compression (squeeze out info about input X).\nI(T;Y): relevance (keep info about label Y).\nβ tunes the trade-off."}, {"m": "6C", "front": "What is the information plane?", "back": "A 2D plot of each layer/representation T as a point:\nx-axis = I(X;T) (input info retained), y-axis = I(T;Y) (label info retained).\nUsed to watch compression vs relevance during training."}, {"m": "6C", "front": "Fitting-then-compression story (Shwartz-Ziv &amp; Tishby)", "back": "Phase 1 (fitting): both I(X;T) and I(T;Y) rise.\nPhase 2 (compression): I(X;T) falls (discard irrelevant input info) while I(T;Y) stays high.\nClaimed link to generalization via SGD noise."}, {"m": "6C", "front": "Saxe et al. caveat to the compression story", "back": "Compression phase depends on saturating activations (tanh) and on the MI-binning estimator.\nWith ReLU/linear nets, compression often doesn't appear yet they still generalize → not a universal cause of generalization."}, {"m": "6C", "front": "What is the Deep Variational IB (VIB)?", "back": "Makes IB tractable for deep nets using variational bounds:\nlower bound on I(T;Y), upper bound on I(X;T) (via a prior).\nTrained with a stochastic encoder + reparameterization; objective resembles a β-VAE loss."}, {"m": "6D", "front": "Why is mutual information hard to estimate?", "back": "MI needs the joint/marginal densities or their ratio.\nIn high dimensions with finite samples these are hard to estimate → estimators have high bias and variance.\nMotivates variational lower bounds."}, {"m": "6D", "front": "Donsker-Varadhan bound (basis of MINE)", "back": "I(X;Y) ≥ E_p(x,y)[T] − log E_p(x)p(y)[e^T], maximized over a neural critic T.\nMINE = Mutual Information Neural Estimation; tight but high-variance, with finite-batch bias from the log-of-expectation."}, {"m": "6D", "front": "InfoNCE and its log N ceiling", "back": "InfoNCE is a contrastive lower bound on MI, low-variance but biased low.\nIt saturates at log N (N = positives + negatives), so it cannot certify MI &gt; log(batch size)."}, {"m": "6D", "front": "Bias/variance among MI estimators", "back": "DV/MINE: tight target but high variance + finite-batch bias.\nNWJ: lower bound via e^{T−1}, unbiased estimate of the bound.\nInfoNCE: stable, low-variance, but underestimates large MI (≤ log N)."}, {"m": "6D", "front": "Tschannen et al. critique of MI-maximization", "back": "Downstream representation quality does NOT track the amount of MI estimated.\nTighter MI bounds can yield worse representations → inductive biases (encoder, critic architecture) matter more than the MI value."}, {"m": "6E", "front": "ELBO as rate + distortion", "back": "−ELBO = distortion + rate.\nDistortion = −E_q[log p(x|z)] (reconstruction cost).\nRate = KL(q(z|x)‖p(z)) (bits to encode latent).\nGives a rate-distortion view of the VAE."}, {"m": "6E", "front": "β-VAE and 'Fixing a Broken ELBO'", "back": "Objective: distortion + β·rate.\nEqual ELBO can hide very different (rate, distortion) points (ELBO is degenerate).\nSweeping β moves along the R-D frontier, controlling latent usage vs posterior collapse."}, {"m": "6E", "front": "What is posterior collapse (R-D view)?", "back": "Rate KL(q(z|x)‖p(z)) → 0, so I(x;z) ≈ 0 and the latent is unused.\nA powerful decoder still reconstructs without z.\nIt's the low-rate degenerate corner of the R-D plane."}, {"m": "6E", "front": "Bits-back / BB-ANS coding", "back": "Lossless scheme: recover the bits used to sample z ~ q(z|x) on the decoder side ('get them back').\nEffective rate approaches the negative ELBO (marginal description length).\nBB-ANS implements it with Asymmetric Numeral Systems."}, {"m": "6E", "front": "Learned compression as nonlinear transform coding", "back": "Learned encoder = nonlinear analysis transform (replaces fixed linear DCT of JPEG).\nLatent is quantized + entropy-coded under a learned prior; decoder = synthesis transform.\nTrain to minimize rate (latent entropy) + λ·distortion."}];

function attr(value){
  return String(value).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
}
function slugify(value){
  return String(value||"").toLowerCase()
    .replace(/&amp;/g,"and").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
}
function texBody(value){
  return String(value)
    .replace(/log₂/g,"\\log_2")
    .replace(/𝒳/g,"\\mathcal{X}")
    .replace(/·/g,"\\,")
    .replace(/−/g,"-")
    .replace(/→/g,"\\to")
    .replace(/≤/g,"\\le")
    .replace(/≥/g,"\\ge")
    .replace(/≈/g,"\\approx");
}
function fmt(value){
  return String(value)
    .replace(/2\^\(([^)]+)\)/g,(_,body)=>`$2^{${texBody(body)}}$`)
    .replace(/(^|[^$])2\^\{([^}]+)\}/g,(_,prefix,body)=>`${prefix}$2^{${texBody(body)}}$`)
    .replace(/H₂\(([^)]+)\)/g,(_,body)=>`$H_2(${texBody(body)})$`)
    .replace(/log₂\|𝒳\|/g,"$\\log_2 |\\mathcal{X}|$")
    .replace(/log₂/g,"$\\log_2$")
    .replace(/D\(([^)]*?)‖([^)]*?)\)/g,(_,left,right)=>`$D(${texBody(left)}\\Vert ${texBody(right)})$`);
}
function defaultWrongNote(q){
  return WRONG_BY_CATEGORY[q.c] || "This choice conflicts with the module result named in the correct answer.";
}
function hydrateStudyMetadata(){
  for(const q of Q){
    q.s ||= q.c || "Review";
    if(!q.w){
      q.w=Object.fromEntries(q.d.map(d=>[d, defaultWrongNote(q)]));
    }
  }
  for(const q of TF){
    q.s ||= "True / False";
  }
  for(const m of MATCH){
    m.s ||= m.t || "Matching";
  }
  for(const c of FC){
    c.s ||= "Flashcards";
  }
}
function loadSrs(){
  try{return JSON.parse(localStorage.getItem(FC_SRS_KEY)||"{}");}
  catch{return {};}
}
function saveSrs(state){
  localStorage.setItem(FC_SRS_KEY,JSON.stringify(state));
}
function cardId(card){
  return `${card.m}:${card.front}`;
}
function dueInText(ms){
  if(ms<=0)return "due now";
  const mins=Math.ceil(ms/60000);
  if(mins<90)return `due in ${mins} min`;
  const hours=Math.ceil(ms/3600000);
  if(hours<48)return `due in ${hours} hr`;
  return `due in ${Math.ceil(ms/86400000)} days`;
}
function scheduleCard(card,rating){
  const state=loadSrs();
  const id=cardId(card);
  const prev=state[id]||{ease:2.3,intervalDays:0,reps:0};
  let ease=prev.ease, intervalDays=prev.intervalDays;
  if(rating==="hard"){
    ease=Math.max(1.3,ease-0.2);
    intervalDays=intervalDays?Math.max(10/1440,intervalDays*0.45):10/1440;
  }else if(rating==="ok"){
    intervalDays=intervalDays?Math.max(1,intervalDays*ease):1;
  }else{
    ease=Math.min(3.0,ease+0.15);
    intervalDays=intervalDays?Math.max(3,intervalDays*(ease+0.5)):4;
  }
  state[id]={ease,intervalDays,reps:prev.reps+1,due:Date.now()+intervalDays*86400000,last:Date.now(),rating};
  saveSrs(state);
}
hydrateStudyMetadata();

function reviewLink(mod, anchor){
  const slug=MOD_URL[mod];
  if(!slug)return "";
  const modInfo=PARTS.flatMap(p=>p.mods).find(m=>m.id===mod);
  const name=modInfo?modInfo.name:mod;
  const hash=anchor?"#"+slugify(anchor):"";
  const label=anchor?` (${fmt(anchor)})`:"";
  return `<a class="review-link" href="./${slug}/${hash}" target="_blank">Review: ${mod} — ${name}${label}</a>`;
}
