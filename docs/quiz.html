function header(){
  const label=curMod||(curPart?"Part "+curPart:"All");
  return `<span class="back-link" id="backNav">&larr; ${curPart?"Modules":"Home"}</span>`;
}
function bindBack(){
  const b=$("#backNav");if(!b)return;
  b.addEventListener("click",()=>{clearInterval(timer);used.clear();if(curMod&&curPart){curMod=null;showModulePicker();}else{curPart=null;curMod=null;showHome();}});
}

// ===================== QUIZ =====================
let qScore=0,qTotal=0,qQueue=[];
function runQuiz(){qScore=0;qTotal=0;qQueue=shuffle(getPool(Q));nextQuiz();}
function nextQuiz(){
  if(!qQueue.length){showSummary(qScore,qTotal);return;}
  const q=qQueue.shift();
  const opts=shuffle([q.a,...q.d]);
  qTotal++;
  const qTotalAll=qTotal+qQueue.length;
  let h=`<div class="game-wrap">${header()}
    <div class="score-bar"><div class="sb-left"><span class="sc">Score: ${qScore}/${qTotal-1}</span><span class="st">Streak: ${gStreak}</span></div><div class="sb-right">${qTotal}/${qTotalAll}</div></div>
    <div class="q-card"><div class="q-cat">${q.m} — ${q.c}</div><div class="q-text">${fmt(q.q)}</div>
    <div class="opts">${opts.map(o=>`<button class="opt" data-a="${o===q.a?1:0}" data-key="${attr(o)}">${fmt(o)}</button>`).join("")}</div>
    <div class="kbd-hint">Keys: 1&ndash;${opts.length} answer &middot; Enter next &middot; Esc back</div>
    <div class="expl" id="expl">${fmt(q.x)}</div></div><button class="nxt" id="nxt">Next</button></div>`;
  app.innerHTML=h;bindBack();renderMath();
  app.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
    if(b.classList.contains("lk"))return;
    app.querySelectorAll(".opt").forEach(o=>{o.classList.add("lk");if(o.dataset.a==="1")o.classList.add("ok");});
    const expl=$("#expl");
    const rl=reviewLink(q.m,q.s);
    if(b.dataset.a==="1"){
      qScore++;gScore++;gStreak++;if(gStreak>gBest)gBest=gStreak;
      expl.classList.add("right");
      expl.innerHTML=`<div class="expl-label green">Correct</div>${fmt(q.x)}<br>${rl}`;
    } else {
      b.classList.add("no");gStreak=0;
      const pickedKey=b.dataset.key, pickedHtml=b.innerHTML;
      const wrongNote=q.w&&q.w[pickedKey]?`<div class="expl-picked">${pickedHtml} — ${fmt(q.w[pickedKey])}</div>`
        :`<div class="expl-picked">You picked: ${pickedHtml}</div>`;
      expl.classList.add("wrong");
      expl.innerHTML=`<div class="expl-label red">Incorrect</div>
        <div class="expl-correct">Correct answer: ${fmt(q.a)}</div>
        ${wrongNote}
        <div class="expl-why">${fmt(q.x)}</div>${rl}`;
    }
    updateStats();$(".sc").textContent=`Score: ${qScore}/${qTotal}`;$(".st").textContent=`Streak: ${gStreak}`;
    expl.classList.add("show");renderMath();$("#nxt").classList.add("show");
  }));
  $("#nxt").addEventListener("click",nextQuiz);
}

// ===================== TRUE/FALSE =====================
let tfScore=0,tfTotal=0,tfQueue=[];
function runTF(){tfScore=0;tfTotal=0;tfQueue=shuffle(getPool(TF));nextTF();}
function nextTF(){
  if(!tfQueue.length){showSummary(tfScore,tfTotal);return;}
  const q=tfQueue.shift();tfTotal++;
  const tfTotalAll=tfTotal+tfQueue.length;
  let h=`<div class="game-wrap">${header()}
    <div class="score-bar"><div class="sb-left"><span class="sc">Score: ${tfScore}/${tfTotal-1}</span><span class="st">Streak: ${gStreak}</span></div><div class="sb-right">${tfTotal}/${tfTotalAll}</div></div>
    <div class="q-card"><div class="q-cat">${q.m} — True or False</div><div class="q-text">${fmt(q.q)}</div>
    <div class="opts"><button class="opt" data-v="true">True</button><button class="opt" data-v="false">False</button></div>
    <div class="kbd-hint">Keys: T / F (or 1 / 2) &middot; Enter next &middot; Esc back</div>
    <div class="expl" id="expl">${fmt(q.x)}</div></div><button class="nxt" id="nxt">Next</button></div>`;
  app.innerHTML=h;bindBack();renderMath();
  app.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
    if(b.classList.contains("lk"))return;
    const picked=b.dataset.v==="true";
    app.querySelectorAll(".opt").forEach(o=>{o.classList.add("lk");if((o.dataset.v==="true")===q.a)o.classList.add("ok");});
    const expl=$("#expl");
    const rl=reviewLink(q.m,q.s);
    if(picked===q.a){
      tfScore++;gScore++;gStreak++;if(gStreak>gBest)gBest=gStreak;
      expl.classList.add("right");
      expl.innerHTML=`<div class="expl-label green">Correct — ${q.a?"True":"False"}</div>${fmt(q.x)}<br>${rl}`;
    } else {
      b.classList.add("no");gStreak=0;
      expl.classList.add("wrong");
      expl.innerHTML=`<div class="expl-label red">Incorrect — The answer is ${q.a?"True":"False"}</div>
        <div class="expl-why">${fmt(q.x)}</div>${rl}`;
    }
    updateStats();$(".sc").textContent=`Score: ${tfScore}/${tfTotal}`;$(".st").textContent=`Streak: ${gStreak}`;
    expl.classList.add("show");renderMath();$("#nxt").classList.add("show");
  }));
  $("#nxt").addEventListener("click",nextTF);
}

// ===================== MATCHING =====================
let mScore=0,mSets=0,mQueue=[];
function runMatch(){mScore=0;mSets=0;mQueue=shuffle(getPool(MATCH));nextMatch();}
function nextMatch(){
  if(!mQueue.length){showSummary(mScore,mSets,true);return;}
  const m=mQueue.shift();mSets++;
  const mTotalAll=mSets+mQueue.length;
  const ls=shuffle(m.p.map(x=>x[0])),rs=shuffle(m.p.map(x=>x[1]));
  const correct=Object.fromEntries(m.p);
  let sel=null,matched=0;
  let h=`<div class="game-wrap">${header()}
    <div class="score-bar"><div class="sb-left"><span class="sc">Matched: 0/${m.p.length}</span></div><div class="sb-right">Set ${mSets}/${mTotalAll}</div></div>
    <div class="q-card"><div class="q-cat">${m.m} — Matching</div><div class="q-text">${fmt(m.t)}</div>
    <div class="match-grid"><div class="match-col"><h4>Terms</h4>${ls.map(l=>`<div class="mi2 left" data-v="${attr(l)}">${fmt(l)}</div>`).join("")}</div>
    <div class="match-col"><h4>Definitions</h4>${rs.map(r=>`<div class="mi2 right" data-v="${attr(r)}">${fmt(r)}</div>`).join("")}</div></div></div>
    <button class="nxt" id="nxt">Next Set</button></div>`;
  app.innerHTML=h;bindBack();renderMath();
  app.querySelectorAll(".mi2").forEach(el=>el.addEventListener("click",()=>{
    if(el.classList.contains("done"))return;
    const isL=el.classList.contains("left");
    if(!sel){el.classList.add("sel");sel={el,isL,v:el.dataset.v};return;}
    if(sel.isL===isL){sel.el.classList.remove("sel");el.classList.add("sel");sel={el,isL,v:el.dataset.v};return;}
    const left=isL?el.dataset.v:sel.v,right=isL?sel.v:el.dataset.v;
    const lEl=isL?el:sel.el,rEl=isL?sel.el:el;
    if(correct[left]===right){
      lEl.classList.remove("sel");lEl.classList.add("done");rEl.classList.remove("sel");rEl.classList.add("done");
      matched++;mScore++;gScore++;gStreak++;if(gStreak>gBest)gBest=gStreak;updateStats();
      $(".sc").textContent=`Matched: ${matched}/${m.p.length}`;
      if(matched===m.p.length)$("#nxt").classList.add("show");
    }else{
      lEl.classList.add("flash");rEl.classList.add("flash");gStreak=0;updateStats();
      setTimeout(()=>{lEl.classList.remove("flash","sel");rEl.classList.remove("flash","sel");},400);
    }
    sel=null;
  }));
  $("#nxt").addEventListener("click",nextMatch);
}

// ===================== SPEED =====================
let sScore=0,sTotal=0,sQueue=[];
function runSpeed(){sScore=0;sTotal=0;sQueue=shuffle(getPool(Q));nextSpeed();}
function nextSpeed(){
  if(!sQueue.length){showSummary(sScore,sTotal);return;}
  const q=sQueue.shift();const opts=shuffle([q.a,...q.d]);sTotal++;
  const sTotalAll=sTotal+sQueue.length;
  let tLeft=12000,done=false;
  let h=`<div class="game-wrap">${header()}
    <div class="score-bar"><div class="sb-left"><span class="sc">Score: ${sScore}/${sTotal-1}</span><span class="st">Streak: ${gStreak}</span></div><div class="sb-right">${sTotal}/${sTotalAll}</div></div>
    <div class="timer-bar"><div class="timer-fill" id="tf2" style="width:100%"></div></div>
    <div class="q-card"><div class="q-cat">${q.m} — ${q.c} (SPEED)</div><div class="q-text">${fmt(q.q)}</div>
    <div class="opts">${opts.map(o=>`<button class="opt" data-a="${o===q.a?1:0}" data-key="${attr(o)}">${fmt(o)}</button>`).join("")}</div>
    <div class="kbd-hint">Keys: 1&ndash;${opts.length} answer &middot; Enter next &middot; Esc back</div>
    <div class="expl" id="expl">${fmt(q.x)}</div></div><button class="nxt" id="nxt">Next</button></div>`;
  app.innerHTML=h;bindBack();renderMath();
  const fill=$("#tf2");
  clearInterval(timer);
  timer=setInterval(()=>{
    if(done)return;tLeft-=40;const pct=Math.max(0,tLeft/12000*100);
    fill.style.width=pct+"%";if(pct<25)fill.classList.add("danger");
    if(tLeft<=0){done=true;clearInterval(timer);gStreak=0;updateStats();
      app.querySelectorAll(".opt").forEach(o=>{o.classList.add("lk");if(o.dataset.a==="1")o.classList.add("ok");});
      $(".sc").textContent=`Score: ${sScore}/${sTotal}`;$(".st").textContent=`Streak: ${gStreak}`;
      const expl=$("#expl");expl.classList.add("wrong");
      expl.innerHTML=`<div class="expl-label red">Time's up!</div>
        <div class="expl-correct">Correct answer: ${fmt(q.a)}</div>
        <div class="expl-why">${fmt(q.x)}</div>${reviewLink(q.m,q.s)}`;
      expl.classList.add("show");renderMath();$("#nxt").classList.add("show");}
  },40);
  app.querySelectorAll(".opt").forEach(b=>b.addEventListener("click",()=>{
    if(done)return;done=true;clearInterval(timer);
    app.querySelectorAll(".opt").forEach(o=>{o.classList.add("lk");if(o.dataset.a==="1")o.classList.add("ok");});
    const expl=$("#expl");
    const rl=reviewLink(q.m,q.s);
    if(b.dataset.a==="1"){
      sScore++;gScore++;gStreak++;if(gStreak>gBest)gBest=gStreak;
      expl.classList.add("right");
      expl.innerHTML=`<div class="expl-label green">Correct</div>${fmt(q.x)}<br>${rl}`;
    } else {
      b.classList.add("no");gStreak=0;
      const pickedKey=b.dataset.key, pickedHtml=b.innerHTML;
      const wrongNote=q.w&&q.w[pickedKey]?`<div class="expl-picked">${pickedHtml} — ${fmt(q.w[pickedKey])}</div>`
        :`<div class="expl-picked">You picked: ${pickedHtml}</div>`;
      expl.classList.add("wrong");
      expl.innerHTML=`<div class="expl-label red">Incorrect</div>
        <div class="expl-correct">Correct answer: ${fmt(q.a)}</div>
        ${wrongNote}
        <div class="expl-why">${fmt(q.x)}</div>${rl}`;
    }
    updateStats();$(".sc").textContent=`Score: ${sScore}/${sTotal}`;$(".st").textContent=`Streak: ${gStreak}`;
    expl.classList.add("show");renderMath();$("#nxt").classList.add("show");
  }));
  $("#nxt").addEventListener("click",nextSpeed);
}

// ===================== FLASHCARDS =====================
function runFlash(){
  const allCards=shuffle(getPool(FC));
  const state=loadSrs();
  const now=Date.now();
  const due=allCards.filter(c=>(state[cardId(c)]?.due||0)<=now);
  const studyingDue=due.length>0;
  const cards=shuffle(studyingDue?due:allCards);
  let idx=0;
  function finish(){
    const mode=studyingDue?"due cards":"study-ahead cards";
    app.innerHTML=`<div class="game-wrap"><div class="summary">
      <h2>Flashcard Round Complete</h2>
      <div class="detail">Scheduled ${cards.length} ${mode}.</div>
      <div class="detail">Deck size: ${allCards.length} cards</div>
      <button class="restart" id="retry">Study Again</button>
      <button class="restart" id="goHome">Home</button>
    </div></div>`;
    $("#retry").addEventListener("click",runFlash);
    $("#goHome").addEventListener("click",()=>{curPart=null;curMod=null;used.clear();showHome();});
  }
  function rateAndAdvance(rating){
    scheduleCard(cards[idx],rating);
    if(idx<cards.length-1){idx++;render();}
    else finish();
  }
  function render(){
    const c=cards[idx];
    const fresh=loadSrs()[cardId(c)];
    const nextDue=fresh?.due?dueInText(fresh.due-Date.now()):"not scheduled yet";
    const status=studyingDue?`${cards.length} due cards in this round`:"No cards are due; studying ahead";
    let h=`<div class="game-wrap">${header()}
      <div class="score-bar"><div class="sb-left"><span>${curMod||curPart?"Module "+( curMod||"Part "+curPart):"All"}</span></div><div class="sb-right">${status}</div></div>
      <div class="fc-card" id="fcCard"><div class="fc-inner">
        <div class="fc-front"><div class="fc-label">${c.m}</div><div class="fc-q">${fmt(c.front)}</div><div class="fc-hint">Click or Space to flip</div></div>
        <div class="fc-back"><div class="fc-a">${fmt(c.back).replace(/\n/g,"<br>")}</div></div>
      </div></div>
      <div class="fc-nav"><button id="fcPrev">&larr; Prev</button><div class="fc-count">${idx+1} / ${cards.length}</div><button id="fcNext">Next &rarr;</button></div>
      <div class="fc-rate"><button class="fc-hard" id="fcH">Hard</button><button class="fc-ok" id="fcO">OK</button><button class="fc-easy" id="fcE">Easy</button></div>
      <div class="fc-meta">Rate the card to schedule it. Current card: ${nextDue}.</div>
      <div class="kbd-hint">Keys: Space flip &middot; &larr;/&rarr; prev/next &middot; 1 Hard &middot; 2 OK &middot; 3 Easy &middot; Esc back</div>
    </div>`;
    app.innerHTML=h;bindBack();renderMath();
    $("#fcCard").addEventListener("click",()=>$("#fcCard").classList.toggle("flipped"));
    $("#fcPrev").addEventListener("click",()=>{if(idx>0){idx--;render();}});
    $("#fcNext").addEventListener("click",()=>{if(idx<cards.length-1){idx++;render();}});
    $("#fcH").addEventListener("click",()=>rateAndAdvance("hard"));
    $("#fcO").addEventListener("click",()=>rateAndAdvance("ok"));
    $("#fcE").addEventListener("click",()=>rateAndAdvance("easy"));
  }
  render();
}

// ===================== CHEAT SHEET =====================
function runSheet(){
  const mods=curMod?[curMod]:curPart?partMods(curPart):PARTS.flatMap(p=>p.mods.map(m=>m.id));
  const sections=[];
  for(const mid of mods){
    const qs=pool(Q,mid),tfs=pool(TF,mid);
    if(!qs.length&&!tfs.length)continue;
    const items=[];
    qs.forEach(q=>items.push(`<strong>${q.c}:</strong> ${fmt(q.q)} &rarr; ${fmt(q.a)}`));
    tfs.forEach(q=>items.push(`<strong>T/F:</strong> ${fmt(q.q)} &rarr; <em>${q.a?"True":"False"}</em> — ${fmt(q.x)}`));
    const modInfo=PARTS.flatMap(p=>p.mods).find(m=>m.id===mid);
    sections.push({id:mid,name:modInfo?.name||mid,items});
  }
  let h=`<div class="sheet">${header()}<h2>Cheat Sheet${curMod?" — "+curMod:curPart?" — Part "+curPart:""}</h2>`;
  for(const s of sections){
    h+=`<div class="sheet-section"><h3>${s.id}: ${s.name}</h3><ul>${s.items.map(i=>`<li>${i}</li>`).join("")}</ul></div>`;
  }
  h+=`</div>`;
  app.innerHTML=h;bindBack();renderMath();
}

// ===================== SUMMARY =====================
function showSummary(sc,tot,isMatch=false){
  const pct=tot?Math.round(sc/tot*100):0;
  const grade=pct>=90?"Excellent":pct>=75?"Great":pct>=60?"Good":"Keep studying";
  const colors=pct>=90?"var(--green)":pct>=75?"var(--blue)":pct>=60?"var(--yellow)":"var(--red)";
  let h=`<div class="game-wrap"><div class="summary">
    <h2>Round Complete</h2>
    <div class="big" style="color:${colors}">${pct}%</div>
    <div class="detail">${sc} / ${tot} correct${isMatch?" pairs":""}</div>
    <div class="detail">Best streak: ${gBest}</div>
    <div class="grade">${grade}</div>
    <button class="restart" id="retry">Play Again</button>
    <button class="restart" id="goHome">Home</button>
  </div></div>`;
  app.innerHTML=h;
  $("#retry").addEventListener("click",()=>{used.clear();startMode();});
  $("#goHome").addEventListener("click",()=>{curPart=null;curMod=null;used.clear();showHome();});
}

// ===================== KEYBOARD =====================
document.addEventListener("keydown",e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const k=e.key;
  if(k==="Escape"){const b=$("#backNav");if(b){e.preventDefault();b.click();}return;}
  // Flashcard mode
  const fc=$("#fcCard");
  if(fc){
    if(k===" "||k==="Enter"){e.preventDefault();fc.click();return;}
    if(k==="ArrowLeft"){$("#fcPrev")?.click();return;}
    if(k==="ArrowRight"){$("#fcNext")?.click();return;}
    if(k==="1"){$("#fcH")?.click();return;}
    if(k==="2"){$("#fcO")?.click();return;}
    if(k==="3"){$("#fcE")?.click();return;}
    return;
  }
  // Advance after answering, or retry from a summary screen
  const nxt=$("#nxt");
  if((k==="Enter"||k===" ")&&nxt&&nxt.classList.contains("show")){e.preventDefault();nxt.click();return;}
  if(k==="Enter"&&$("#retry")){$("#retry").click();return;}
  // Answer selection (quiz / true-false / speed)
  const opts=[...app.querySelectorAll(".opt:not(.lk)")];
  if(!opts.length)return;
  if(/^[1-9]$/.test(k)){const i=+k-1;if(opts[i]){e.preventDefault();opts[i].click();}return;}
  const low=k.toLowerCase();
  if(low==="t"||low==="f"){const want=low==="t"?"true":"false";opts.find(o=>o.dataset.v===want)?.click();}
});

// ===================== INIT =====================
showHome();
</script>
