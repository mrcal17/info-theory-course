<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Information Theory — Complete Study Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --border: #475569;
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
    --blue: #38bdf8; --green: #34d399; --red: #f87171; --yellow: #fbbf24;
    --purple: #a78bfa; --pink: #f472b6; --orange: #fb923c; --cyan: #22d3ee;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--blue); text-decoration: none; }

  /* NAV */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--surface2); background: var(--surface); position: sticky; top: 0; z-index: 100; }
  .topbar h1 { font-size: 1.2rem; color: var(--blue); }
  .topbar .stats { display: flex; gap: 1.2rem; font-size: 0.85rem; color: var(--muted); }
  .topbar .stats span { display: flex; align-items: center; gap: 0.3rem; }
  .topbar .stats .val { color: var(--green); font-weight: 600; }

  /* HOME */
  .home { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .home-header { text-align: center; margin-bottom: 2rem; }
  .home-header h2 { font-size: 2rem; margin-bottom: 0.5rem; }
  .home-header p { color: var(--muted); }

  .part-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .part-card { background: var(--surface); border: 2px solid var(--surface2); border-radius: 12px; padding: 1.3rem;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .part-card:hover { border-color: var(--blue); transform: translateY(-2px); }
  .part-card .part-num { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.4rem; font-weight: 600; }
  .part-card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .part-card .modules { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .part-card .progress-pip { position: absolute; top: 1rem; right: 1rem; font-size: 0.75rem; color: var(--dim);
    background: var(--bg); padding: 0.2rem 0.5rem; border-radius: 4px; }
  .p1 .part-num { color: var(--blue); } .p1:hover { border-color: var(--blue); }
  .p2 .part-num { color: var(--purple); } .p2:hover { border-color: var(--purple); }
  .p3 .part-num { color: var(--pink); } .p3:hover { border-color: var(--pink); }
  .p4 .part-num { color: var(--orange); } .p4:hover { border-color: var(--orange); }
  .p5 .part-num { color: var(--cyan); } .p5:hover { border-color: var(--cyan); }

  .mode-row { display: flex; gap: 0.7rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
  .mode-pill { padding: 0.5rem 1.1rem; border: 2px solid var(--surface2); border-radius: 99px; background: var(--surface);
    color: var(--muted); cursor: pointer; font-size: 0.9rem; transition: all 0.15s; }
  .mode-pill:hover, .mode-pill.active { border-color: var(--blue); color: var(--blue); }

  /* MODULE PICKER */
  .module-picker { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem; }
  .module-picker h2 { margin-bottom: 0.3rem; }
  .module-picker .sub { color: var(--muted); margin-bottom: 1.5rem; }
  .mod-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .mod-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.2rem;
    background: var(--surface); border: 2px solid var(--surface2); border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .mod-item:hover { border-color: var(--blue); }
  .mod-item .mi-left { }
  .mod-item .mi-code { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.2rem; }
  .mod-item .mi-title { font-size: 1rem; }
  .mod-item .mi-count { font-size: 0.8rem; color: var(--dim); }
  .all-btn { margin-top: 0.8rem; padding: 0.8rem; text-align: center; background: var(--blue); color: var(--bg);
    font-weight: 600; border-radius: 10px; cursor: pointer; font-size: 1rem; border: none; width: 100%; }
  .all-btn:hover { opacity: 0.9; }
  .back-link { display: inline-block; margin-bottom: 1rem; color: var(--muted); cursor: pointer; font-size: 0.9rem; }
  .back-link:hover { color: var(--blue); }

  /* GAME AREA */
  .game-wrap { max-width: 800px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
  .score-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 1rem;
    background: var(--surface); border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem; }
  .score-bar .sb-left { display: flex; gap: 1.2rem; }
  .score-bar .sc { color: var(--green); font-weight: 600; }
  .score-bar .st { color: var(--yellow); font-weight: 600; }
  .score-bar .sb-right { color: var(--dim); }

  .q-card { background: var(--surface); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .q-card .q-cat { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--blue); margin-bottom: 0.5rem; }
  .q-card .q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 1.2rem; }
  .q-card code { background: var(--surface2); padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.88em; }

  .opts { display: grid; gap: 0.5rem; }
  .opt { padding: 0.75rem 1rem; border: 2px solid var(--surface2); border-radius: 8px; background: var(--bg);
    color: var(--text); cursor: pointer; font-size: 0.92rem; text-align: left; transition: all 0.12s; line-height: 1.4; }
  .opt:hover:not(.lk) { border-color: var(--dim); background: var(--surface); }
  .opt.ok { border-color: var(--green); background: #064e3b; color: #a7f3d0; }
  .opt.no { border-color: var(--red); background: #7f1d1d; color: #fca5a5; }
  .opt.lk { cursor: default; opacity: 0.55; }
  .opt.lk.ok { opacity: 1; }

  .expl { margin-top: 1rem; padding: 1rem; background: var(--surface2); border-radius: 8px;
    font-size: 0.88rem; line-height: 1.5; color: var(--text); display: none; }
  .expl.show { display: block; }
  .expl.wrong { border-left: 3px solid var(--red); }
  .expl.right { border-left: 3px solid var(--green); }
  .expl .expl-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; font-weight: 600; }
  .expl .expl-label.red { color: var(--red); }
  .expl .expl-label.green { color: var(--green); }
  .expl .expl-correct { color: var(--green); font-weight: 600; margin-bottom: 0.4rem; }
  .expl .expl-picked { color: var(--red); margin-bottom: 0.4rem; font-style: italic; }
  .expl .expl-why { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); color: var(--muted); }
  .expl .review-link { display: inline-block; margin-top: 0.7rem; padding: 0.35rem 0.8rem; border: 1px solid var(--blue);
    border-radius: 6px; font-size: 0.8rem; color: var(--blue); transition: all 0.15s; }
  .expl .review-link:hover { background: #1e3a5f; }

  .nxt { display: none; margin-top: 1rem; padding: 0.65rem 2rem; border: none; border-radius: 8px;
    background: var(--blue); color: var(--bg); font-weight: 600; font-size: 0.95rem; cursor: pointer; }
  .nxt:hover { opacity: 0.9; }
  .nxt.show { display: inline-block; }

  /* Timer */
  .timer-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 1rem; overflow: hidden; }
  .timer-fill { height: 100%; background: var(--blue); transition: width 0.08s linear; }
  .timer-fill.danger { background: var(--red); }

  /* Matching */
  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .match-col { display: flex; flex-direction: column; gap: 0.5rem; }
  .match-col h4 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 0.2rem; }
  .mi2 { padding: 0.65rem 0.8rem; border: 2px solid var(--surface2); border-radius: 8px; background: var(--bg);
    cursor: pointer; font-size: 0.85rem; transition: all 0.12s; line-height: 1.3; }
  .mi2:hover:not(.done) { border-color: var(--dim); }
  .mi2.sel { border-color: var(--blue); background: #1e3a5f; }
  .mi2.done { border-color: var(--green); background: #064e3b; color: #a7f3d0; cursor: default; opacity: 0.7; }
  .mi2.flash { border-color: var(--red); background: #7f1d1d; }

  /* Flashcards */
  .fc-card { perspective: 800px; cursor: pointer; margin-bottom: 1rem; }
  .fc-inner { position: relative; width: 100%; min-height: 200px; transition: transform 0.5s; transform-style: preserve-3d; }
  .fc-card.flipped .fc-inner { transform: rotateY(180deg); }
  .fc-front, .fc-back { position: absolute; width: 100%; min-height: 200px; backface-visibility: hidden;
    border-radius: 12px; padding: 2rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .fc-front { background: var(--surface); border: 2px solid var(--surface2); }
  .fc-back { background: #1e3a5f; border: 2px solid var(--blue); transform: rotateY(180deg); }
  .fc-front .fc-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--blue); margin-bottom: 0.8rem; }
  .fc-front .fc-q { font-size: 1.15rem; line-height: 1.5; }
  .fc-back .fc-a { font-size: 1.05rem; line-height: 1.5; }
  .fc-hint { font-size: 0.8rem; color: var(--dim); margin-top: 1rem; }
  .fc-nav { display: flex; gap: 0.8rem; justify-content: center; align-items: center; }
  .fc-nav button { padding: 0.5rem 1.5rem; border: 2px solid var(--surface2); border-radius: 8px;
    background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.9rem; }
  .fc-nav button:hover { border-color: var(--blue); }
  .fc-nav .fc-count { color: var(--dim); font-size: 0.85rem; min-width: 80px; text-align: center; }
  .fc-rate { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
  .fc-rate button { padding: 0.4rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .fc-rate .fc-hard { background: #7f1d1d; color: #fca5a5; }
  .fc-rate .fc-ok { background: #854d0e; color: #fde68a; }
  .fc-rate .fc-easy { background: #064e3b; color: #a7f3d0; }
  .fc-meta { margin-top: 0.8rem; text-align: center; font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .study-links { text-align: center; margin-top: 0.9rem; font-size: 0.85rem; color: var(--muted); }
  .study-links a { border-bottom: 1px solid var(--border); }

  /* Summary */
  .summary { text-align: center; padding: 2rem; }
  .summary h2 { color: var(--blue); margin-bottom: 1rem; }
  .summary .big { font-size: 3.5rem; font-weight: 700; }
  .summary .detail { color: var(--muted); margin: 0.4rem 0; }
  .summary .grade { font-size: 1.2rem; margin: 1rem 0; }
  .restart { margin-top: 1rem; padding: 0.65rem 2rem; border: 2px solid var(--blue); border-radius: 8px;
    background: transparent; color: var(--blue); font-size: 0.95rem; cursor: pointer; margin-right: 0.5rem; }
  .restart:hover { background: #1e3a5f; }

  /* Cheat sheet */
  .sheet { max-width: 900px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
  .sheet h2 { margin-bottom: 1rem; }
  .sheet-section { background: var(--surface); border-radius: 10px; padding: 1.2rem; margin-bottom: 0.8rem; }
  .sheet-section h3 { font-size: 0.95rem; color: var(--blue); margin-bottom: 0.6rem; }
  .sheet-section ul { padding-left: 1.2rem; }
  .sheet-section li { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }
  .sheet-section li strong { color: var(--text); }

  @media (max-width: 600px) {
    .match-grid { grid-template-columns: 1fr; }
    .part-grid { grid-template-columns: 1fr; }
    .topbar { flex-direction: column; gap: 0.5rem; }
  }
  .kbd-hint { margin-top: 0.6rem; font-size: 0.72rem; color: var(--dim); }
</style>

<body>

<div class="topbar">
  <h1 id="navTitle" style="cursor:pointer">Information Theory Study Tool</h1>
  <div class="stats">
    <span>Score: <span class="val" id="globalScore">0</span></span>
    <span>Streak: <span class="val" id="globalStreak">0</span></span>
    <span>Best: <span class="val" id="globalBest">0</span></span>
  </div>
</div>

<div id="app"></div>

<script>
// ===================== DATA =====================
const Q = [{"m": "0A", "c": "Concept", "q": "In information theory, what does one bit fundamentally represent?", "a": "The amount of information needed to resolve one yes/no question with two equally likely outcomes", "d": ["The smallest unit of computer storage, equal to one transistor's state", "Eight binary digits grouped together as a byte", "The maximum data that can travel through a wire per second"], "x": "A bit is the information gained from answering one yes/no question whose two outcomes are equally likely; this is the unit when uncertainty is measured with log₂."}, {"m": "0A", "c": "Equation", "q": "To measure information in nats instead of bits, which logarithm base do you use?", "a": "The natural logarithm (ln, base e)", "d": ["log₂ (base 2)", "log₁₀ (base 10)", "log base 256"], "x": "Using ln (base e) gives units of nats; log₂ gives bits and log₁₀ gives bans/hartleys."}, {"m": "0A", "c": "Equation", "q": "Approximately how many bits is 1 nat?", "a": "≈ 1.4427 bits", "d": ["≈ 0.6931 bits", "≈ 2.0000 bits", "≈ 3.3219 bits"], "x": "1 nat = log₂(e) ≈ 1.4427 bits, since converting from base e to base 2 multiplies by 1/ln2 = log₂(e)."}, {"m": "0A", "c": "Concept", "q": "Which trio best describes the three pillars of an information-theory course?", "a": "The classical core (entropy, mutual information, channel capacity), practical coding (compression and error correction), and information theory for machine learning", "d": ["Hardware, software, and networking", "Arithmetic, calculus, and linear algebra", "Encryption, hashing, and authentication"], "x": "The course is organized around the classical Shannon core, practical coding techniques, and modern IT-for-ML applications."}, {"m": "0A", "c": "Intuition", "q": "Why is uncertainty naturally measured in bits?", "a": "Because each bit corresponds to one optimal yes/no question, so the number of bits is the number of such questions needed on average to pin down the outcome", "d": ["Because computers store everything as bits, so all measurements must match hardware", "Because bits are the largest unit that fits in a single CPU register", "Because the metric system standardized information on powers of two"], "x": "Uncertainty in bits = the average number of optimal yes/no questions needed to identify the outcome, which is exactly what log₂ counts."}, {"m": "0A", "c": "Equation", "q": "If you compute an information quantity in bits and want the value in nats, what do you multiply by?", "a": "ln 2 ≈ 0.6931", "d": ["log₂ e ≈ 1.4427", "ln 10 ≈ 2.3026", "1 (the value is unchanged)"], "x": "bits → nats means dividing by log₂(e), equivalently multiplying by ln2 ≈ 0.6931; conversely nats → bits multiplies by 1.4427."}, {"m": "1A", "c": "Equation", "q": "What is the self-information h(x) of an outcome x with probability p(x)?", "a": "h(x) = -log₂ p(x)", "d": ["h(x) = log₂ p(x)", "h(x) = p(x)·log₂ p(x)", "h(x) = -p(x)·log₂ p(x)"], "x": "Self-information (surprise) is -log₂ p(x): rarer outcomes carry more information. The term p(x)·(-log₂ p(x)) is the per-symbol contribution to entropy, not the self-information itself."}, {"m": "1A", "c": "Concept", "q": "Entropy H(X) is best described as which of the following?", "a": "The expected (average) value of the self-information over the distribution of X", "d": ["The maximum possible self-information of any single outcome", "The self-information of the most probable outcome", "The number of distinct outcomes X can take"], "x": "H(X) = Σ p(x)·(-log₂ p(x)) = E[h(X)], the average surprise per symbol drawn from X."}, {"m": "1A", "c": "Equation", "q": "Which expression is the correct chain rule for joint entropy of two variables?", "a": "H(X,Y) = H(X) + H(Y|X)", "d": ["H(X,Y) = H(X) + H(Y)", "H(X,Y) = H(X) · H(Y|X)", "H(X,Y) = H(X|Y) + H(Y|X)"], "x": "The chain rule decomposes the joint entropy as the entropy of X plus the average remaining uncertainty in Y once X is known."}, {"m": "1A", "c": "Concept", "q": "For a variable X taking values in alphabet 𝒳, when does H(X) = log₂|𝒳| hold with equality?", "a": "When X is uniformly distributed over 𝒳", "d": ["When X is deterministic (one outcome has probability 1)", "When X is maximally skewed toward one symbol", "Only when |𝒳| = 2"], "x": "H(X) ≤ log₂|𝒳| always, with equality iff every outcome is equally likely; the uniform distribution maximizes entropy on a fixed alphabet."}, {"m": "1A", "c": "Intuition", "q": "At what value of p is the binary entropy function H₂(p) = -p·log₂p - (1-p)·log₂(1-p) maximized, and what is its value there?", "a": "p = ½, where H₂(½) = 1 bit", "d": ["p = 0, where H₂(0) = 1 bit", "p = 1, where H₂(1) = 1 bit", "p = ¼, where H₂(¼) ≈ 0.81 bit"], "x": "A fair coin (p = ½) is the most uncertain binary source, giving exactly 1 bit; H₂ drops to 0 at the deterministic endpoints p = 0 or 1."}, {"m": "1A", "c": "Concept", "q": "What does 'conditioning reduces entropy' formally state?", "a": "H(X|Y) ≤ H(X), with equality iff X and Y are independent", "d": ["H(X|Y) ≥ H(X) always", "H(X|Y) = H(X) - H(Y) always", "H(X|Y) ≤ H(Y), with equality iff X = Y"], "x": "On average, knowing Y can only decrease (never increase) the uncertainty in X; equality holds exactly when Y carries no information about X (independence)."}, {"m": "1B", "c": "Concept", "q": "Which property characterizes the KL divergence D(p‖q)?", "a": "D(p‖q) ≥ 0 with equality iff p = q, and it is asymmetric in general", "d": ["D(p‖q) ≥ 0 and it is symmetric: D(p‖q) = D(q‖p)", "D(p‖q) can be negative when q is more spread out than p", "D(p‖q) is a true metric satisfying the triangle inequality"], "x": "Gibbs' inequality gives non-negativity with equality only when the distributions match; KL is generally asymmetric and is not a metric."}, {"m": "1B", "c": "Equation", "q": "How does cross-entropy relate to entropy and KL divergence?", "a": "Cross-entropy of p relative to q = H(p) + D(p‖q)", "d": ["Cross-entropy = H(p) - D(p‖q)", "Cross-entropy = D(p‖q) - H(p)", "Cross-entropy = H(p) · D(p‖q)"], "x": "The expected code length using a code optimized for q to encode data from p is H(p) plus the KL penalty D(p‖q) for the mismatch."}, {"m": "1B", "c": "Equation", "q": "Which set of identities correctly expresses mutual information I(X;Y)?", "a": "I(X;Y) = H(X) - H(X|Y) = D(p(x,y)‖p(x)p(y))", "d": ["I(X;Y) = H(X) + H(X|Y)", "I(X;Y) = H(X,Y) - H(X) - H(Y)", "I(X;Y) = D(p(x)p(y)‖p(x,y)) only"], "x": "Mutual information is the reduction in uncertainty about X from observing Y, equivalently the KL divergence between the joint and the product of marginals."}, {"m": "1B", "c": "Concept", "q": "What does the data-processing inequality state for a Markov chain X → Y → Z?", "a": "I(X;Z) ≤ I(X;Y)", "d": ["I(X;Z) ≥ I(X;Y)", "I(X;Z) = I(X;Y) always", "I(X;Z) ≤ I(Y;Z) is impossible"], "x": "Post-processing Y into Z cannot create information about X: any processing can only lose (or preserve) information, never increase it."}, {"m": "1B", "c": "Intuition", "q": "Jensen's inequality applied to the convex function -log underlies which information-theoretic result?", "a": "The non-negativity of KL divergence, D(p‖q) ≥ 0", "d": ["The chain rule for entropy", "The symmetry of mutual information", "The fact that H(X) ≤ log₂|𝒳| is an equality"], "x": "Because -log is convex, Jensen's inequality gives E[-log(q/p)] ≥ -log E[q/p] = 0, which is exactly Gibbs' inequality / non-negativity of KL."}, {"m": "1C", "c": "Equation", "q": "For a stationary Markov chain with stationary distribution μ and transition rows, what is the entropy rate?", "a": "H = Σᵢ μᵢ · H(row i), the average over states of the entropy of each row's transition distribution", "d": ["H = Σᵢ μᵢ · log₂ μᵢ", "H = H(stationary distribution μ) only", "H = max over rows of H(row i)"], "x": "The entropy rate of a Markov chain is the stationary-weighted average of the conditional entropies of the next state given each current state."}, {"m": "1C", "c": "Concept", "q": "The AEP states that for an i.i.d. source, the quantity -(1/n)·log₂ p(x₁...xₙ) converges (in probability) to what?", "a": "The entropy H(X)", "d": ["log₂|𝒳|", "Zero", "The self-information of the most likely sequence"], "x": "By the law of large numbers, the per-symbol log-probability of a typical sequence converges to H(X), the foundation of the Asymptotic Equipartition Property."}, {"m": "1C", "c": "Concept", "q": "Approximately how many sequences are in the typical set, and how much probability do they carry?", "a": "About 2^(nH) sequences, together carrying nearly all the probability", "d": ["About 2^(nH) sequences, but carrying a vanishing fraction of probability", "About |𝒳|ⁿ sequences, carrying nearly all the probability", "About 2^(n·log₂|𝒳|) sequences, carrying half the probability"], "x": "The typical set has size ≈ 2^(nH) and captures probability → 1, even though it is a vanishing fraction of all |𝒳|ⁿ sequences when H &lt; log₂|𝒳|."}, {"m": "1C", "c": "Intuition", "q": "Why is the typical set a 'vanishing fraction' of all possible length-n sequences when the source is non-uniform?", "a": "Because 2^(nH) is exponentially smaller than |𝒳|ⁿ = 2^(n·log₂|𝒳|) when H &lt; log₂|𝒳|", "d": ["Because the typical set contains the single most probable sequence only", "Because all sequences are equally likely, so any subset is vanishing", "Because the typical set shrinks to a constant size as n grows"], "x": "For non-uniform sources H &lt; log₂|𝒳|, so the ratio 2^(nH)/2^(n·log₂|𝒳|) = 2^(-n(log₂|𝒳|-H)) → 0, yet that tiny fraction still holds essentially all the probability."}, {"m": "1C", "c": "Concept", "q": "What is the entropy rate of an i.i.d. process compared to a single symbol's entropy?", "a": "It equals H(X), the entropy of a single symbol", "d": ["It equals n·H(X)", "It equals H(X)/n → 0", "It is undefined for i.i.d. processes"], "x": "For an i.i.d. source the per-symbol entropy rate is just H(X); the joint entropy of n symbols is n·H(X), and the rate divides that by n."}, {"m": "2A", "c": "Concept", "q": "Which property is strongest (most restrictive) and guarantees instantaneous decoding without lookahead?", "a": "Prefix (instantaneous) code", "d": ["Nonsingular code", "Uniquely decodable code", "Singular code"], "x": "A prefix code (no codeword is a prefix of another) lets you decode each symbol the moment its codeword ends; it is a strict subset of uniquely-decodable codes, which are a subset of nonsingular codes."}, {"m": "2A", "c": "Equation", "q": "The Kraft inequality for a uniquely-decodable binary code with lengths l₁,...,lₘ states:", "a": "Σ 2^(-lᵢ) ≤ 1", "d": ["Σ 2^(-lᵢ) ≥ 1", "Σ 2^(lᵢ) ≤ 1", "Σ lᵢ · pᵢ ≤ H"], "x": "Kraft (and McMillan's extension to all uniquely-decodable codes) requires Σ 2^(-lᵢ) ≤ 1; conversely any lengths satisfying it admit a prefix code."}, {"m": "2A", "c": "Equation", "q": "For a source with entropy H (bits), the expected length L of any uniquely-decodable binary code satisfies which lower bound?", "a": "L ≥ H", "d": ["L ≥ H + 1", "L ≤ H", "L ≥ 2H"], "x": "The source coding theorem gives L ≥ H, with equality iff every pᵢ is a power of 1/2 (so lᵢ = log₂ 1/pᵢ exactly)."}, {"m": "2A", "c": "Equation", "q": "Shannon code lengths are chosen as lᵢ = ⌈log₂(1/pᵢ)⌉. What overall bound on expected length does this guarantee?", "a": "H ≤ L &lt; H + 1", "d": ["H ≤ L &lt; H + 2", "H − 1 &lt; L ≤ H", "L = H exactly"], "x": "Rounding each ideal length up by less than 1 bit gives expected length within 1 bit of entropy: H ≤ L &lt; H+1."}, {"m": "2A", "c": "Intuition", "q": "Why can the ⌈log₂ 1/p⌉ rounding make a Shannon code wasteful compared to the entropy?", "a": "Each symbol must use an integer number of bits, so probabilities that are not powers of 1/2 force rounding loss", "d": ["Shannon codes are not uniquely decodable", "Shannon codes violate the Kraft inequality", "Entropy is computed in nats, not bits"], "x": "Integer codeword lengths cannot exactly match log₂ 1/p when p isn't a power of 1/2, costing up to nearly 1 bit per symbol."}, {"m": "2A", "c": "Weakness", "q": "A code has codewords {0, 01, 11}. What is its decodability status?", "a": "Nonsingular but NOT a prefix code (0 is a prefix of 01)", "d": ["Prefix code", "Not even nonsingular", "Uniquely decodable and prefix-free"], "x": "All codewords are distinct (nonsingular), but '0' is a prefix of '01', so it is not a prefix/instantaneous code."}, {"m": "2B", "c": "Algorithm", "q": "At each step of Huffman coding, which nodes are merged?", "a": "The two nodes with the smallest probabilities", "d": ["The two nodes with the largest probabilities", "The two nodes with the longest current codewords", "A random pair of remaining nodes"], "x": "Huffman is greedy bottom-up: it always combines the two least-probable nodes, summing their probabilities into a new parent."}, {"m": "2B", "c": "Concept", "q": "Huffman coding is optimal in what precise sense?", "a": "It gives the minimum expected length among all symbol (per-symbol) prefix codes for the distribution", "d": ["It always achieves expected length exactly equal to the entropy", "It is optimal among all possible compression schemes including arithmetic coding", "It minimizes the maximum codeword length"], "x": "No symbol code can beat Huffman's expected length, but it cannot break the integer-length barrier the way arithmetic coding can."}, {"m": "2B", "c": "Weakness", "q": "What is the fundamental limitation of Huffman coding that block/extended Huffman tries to mitigate?", "a": "Codeword lengths must be integers, so it can't assign fractional bits to highly probable symbols", "d": ["It is not a prefix code", "It cannot be decoded uniquely", "It requires the source to be memoryless"], "x": "Integer lengths mean a symbol with p close to 1 still costs at least 1 bit; grouping symbols into blocks amortizes this overhead."}, {"m": "2B", "c": "Equation", "q": "For a Huffman code, the expected length L relative to entropy H satisfies:", "a": "H ≤ L &lt; H + 1", "d": ["L &lt; H", "H − 1 ≤ L &lt; H", "L = H always"], "x": "As an optimal symbol code it meets the same H ≤ L &lt; H+1 bound; the gap shrinks toward 0 with block coding."}, {"m": "2B", "c": "Intuition", "q": "A binary source emits symbol A with p = 0.99 and B with p = 0.01. Why does plain Huffman compress poorly here?", "a": "Huffman must give each symbol at least 1 bit, but the entropy is only about 0.08 bits/symbol", "d": ["Huffman cannot handle two-symbol alphabets", "Huffman assigns A a long codeword because it is frequent", "The Kraft inequality is violated"], "x": "With only two symbols Huffman gives 1 bit each (L=1), far above H≈0.08; block/arithmetic coding is needed to approach entropy."}, {"m": "2B", "c": "Algorithm", "q": "What does extended (block) Huffman coding do to approach the entropy more closely?", "a": "It builds a Huffman code over blocks of n symbols, reducing per-symbol overhead to below 1/n", "d": ["It uses non-integer codeword lengths", "It abandons the prefix property for shorter codes", "It recomputes probabilities after every symbol"], "x": "Coding n-symbol super-symbols spreads the &lt;1-bit overhead across n symbols, so L/n → H as n increases."}, {"m": "2C", "c": "Core idea", "q": "What does an arithmetic coder do to encode a message?", "a": "Recursively subdivides the interval [0,1) according to symbol probabilities and emits a number inside the final subinterval", "d": ["Assigns each symbol a fixed-length codeword based on its rank in the alphabet", "Builds a binary tree and walks it from leaves to root", "Sorts symbols by frequency and emits run lengths"], "x": "Each symbol narrows the current interval to a sub-range proportional to its probability; the final tiny interval identifies the whole message, and any number within it (in binary) is the code."}, {"m": "2C", "c": "Code length", "q": "For a message of probability p, roughly how many bits does an arithmetic coder use?", "a": "About −log₂ p bits, with at most a constant (≈2 bits) of total overhead", "d": ["Exactly ⌈−log₂ p⌉ bits per symbol, rounded up individually", "Exactly the Huffman code length for the message", "One bit per symbol regardless of p"], "x": "The final interval has width ≈ p, so it takes about −log₂ p bits to specify a point in it. The rounding penalty is a small constant for the whole stream, not per symbol."}, {"m": "2C", "c": "Vs Huffman", "q": "Why can arithmetic coding beat Huffman coding on a highly skewed source (one symbol with p ≈ 0.95)?", "a": "Huffman must spend a whole integer bit (≥1) per symbol, while arithmetic coding can spend a fraction of a bit per symbol", "d": ["Huffman cannot encode sources with more than two symbols", "Arithmetic coding ignores the probabilities entirely", "Huffman requires the source to be uniform to work at all"], "x": "The entropy of a near-certain symbol is far below 1 bit (e.g. −log₂ 0.95 ≈ 0.074 bits), but Huffman's minimum codeword is 1 bit, so it wastes nearly a bit each time."}, {"m": "2C", "c": "Adaptive models", "q": "How does an adaptive arithmetic coder handle changing symbol statistics?", "a": "It updates the probability model after each symbol using counts seen so far, and the decoder mirrors the same updates", "d": ["It re-reads the entire file twice and stores a fixed table in the header", "It freezes the model after the first symbol to keep encoder and decoder in sync", "It requires the true probabilities to be transmitted separately for every symbol"], "x": "Because the decoder updates its model identically (using only already-decoded symbols), no probability table needs to be sent; the model can track non-stationary sources on the fly."}, {"m": "2C", "c": "Range coding", "q": "How does range coding differ from classic arithmetic coding in practice?", "a": "It works with a large integer range and emits whole bytes/digits, avoiding bit-level renormalization", "d": ["It subdivides [0,1) using only equal-width intervals", "It is restricted to two-symbol alphabets", "It cannot be made adaptive"], "x": "Range coding is essentially arithmetic coding implemented on integers with byte-oriented renormalization; it produces near-identical compression while being faster on byte-based hardware."}, {"m": "2C", "c": "Optimality", "q": "What is the main reason arithmetic coding achieves near-optimal compression that Huffman cannot guarantee?", "a": "It does not force an integer number of bits per symbol, so it avoids per-symbol rounding loss", "d": ["It always finds a shorter code than the source entropy", "It uses a different logarithm base than Huffman", "It only works when all probabilities are powers of ½"], "x": "Huffman's integer-length constraint can cost up to ~1 bit per symbol above entropy; arithmetic coding spreads the cost across the whole message, approaching the entropy bound."}, {"m": "2D", "c": "Dictionary coding", "q": "What is the core idea behind dictionary-based compression methods like the LZ family?", "a": "Replace repeated strings (substrings already seen) with shorter references to a dictionary of previous data", "d": ["Assign fixed-length codes to symbols based on a precomputed probability table", "Apply a reversible arithmetic transform that maps the whole message to a single fraction", "Permute the input bytes so that runs of identical symbols cluster together"], "x": "Dictionary coders build a dictionary of previously seen strings and emit pointers/references instead of repeating the literal data, exploiting repetition rather than per-symbol statistics."}, {"m": "2D", "c": "LZ77", "q": "In LZ77, what does an output token typically encode?", "a": "An (offset, length) pair pointing back into the sliding window, plus the next literal symbol", "d": ["A dictionary index plus a Huffman code for the symbol's probability", "A run-length count followed by the repeated byte", "The arithmetic-coding interval bounds for the next symbol"], "x": "Classic LZ77 emits triples (offset back into the window, match length, next character), so a match is reproduced by copying length bytes starting offset positions back."}, {"m": "2D", "c": "Sliding window", "q": "What role does the 'sliding window' play in LZ77?", "a": "It is the bounded recent history used as the dictionary; matches can only reference data inside it", "d": ["It stores the full file so any earlier match can be referenced at any distance", "It holds the Huffman code tree that is rebuilt for each block", "It buffers the compressed output before it is written to disk"], "x": "LZ77 searches a finite window of recently seen bytes for matches; as encoding proceeds the window slides forward, bounding memory and the maximum back-reference offset."}, {"m": "2D", "c": "LZ78/LZW", "q": "How does LZW build its dictionary as it processes the input?", "a": "It starts with all single symbols and adds a new entry for each matched phrase extended by the next symbol", "d": ["It reads the whole input first to count frequencies, then assigns codes", "It copies (offset, length) pairs from a sliding window into a fixed table", "It stores only symbols whose probability exceeds a fixed threshold"], "x": "LZW initializes the dictionary with every single character, then after emitting the code for the longest matching phrase it adds that phrase plus the following symbol as a new entry, growing the dictionary adaptively."}, {"m": "2D", "c": "Universality", "q": "In what sense are LZ algorithms 'universal'?", "a": "For a stationary ergodic source, their compression rate approaches the source's entropy rate without prior knowledge of the source statistics", "d": ["They achieve the entropy rate only if the source distribution is supplied in advance", "They guarantee compression of every possible input, including random data", "They are optimal only for memoryless (i.i.d.) sources, not for sources with memory"], "x": "LZ78/LZ77 are asymptotically optimal: as the input length grows, the per-symbol code length converges to the entropy rate H even though the encoder never knows the underlying probabilities."}, {"m": "2D", "c": "Real-world", "q": "Which combination best describes how the gzip / zlib / PNG (DEFLATE) format works?", "a": "LZ77 sliding-window matching followed by Huffman coding of the literals, lengths, and offsets", "d": ["LZW dictionary coding followed by arithmetic coding of dictionary indices", "Pure run-length encoding followed by a Burrows-Wheeler transform", "LZ78 phrase parsing with no entropy coding stage afterward"], "x": "DEFLATE (used by gzip, zlib, zip, and PNG) combines LZ77 to find repeats with Huffman coding to entropy-code the resulting literals, match lengths, and back-reference distances."}, {"m": "3A", "c": "Equation", "q": "For a binary symmetric channel (BSC) with crossover probability p, what is the capacity C?", "a": "C = 1 - H₂(p), where H₂(p) = -p log₂ p - (1-p) log₂(1-p)", "d": ["C = H₂(p)", "C = 1 - p", "C = 1 - 2p"], "x": "The BSC capacity is achieved by a uniform input; the noise removes H₂(p) bits per use, leaving C = 1 - H₂(p)."}, {"m": "3A", "c": "Concept", "q": "What is the capacity of a binary erasure channel (BEC) with erasure probability e?", "a": "C = 1 - e", "d": ["C = 1 - H₂(e)", "C = e", "C = 1 - 2e"], "x": "A fraction e of symbols are erased and carry no information, so on average a fraction (1-e) of bits get through reliably; C = 1 - e."}, {"m": "3A", "c": "Concept", "q": "Channel capacity C of a discrete memoryless channel is defined as which optimization?", "a": "C = max over the input distribution p(x) of the mutual information I(X;Y)", "d": ["C = min over p(x) of I(X;Y)", "C = max over p(x) of H(X)", "C = max over the channel p(y|x) of I(X;Y)"], "x": "Capacity is the largest mutual information achievable by choosing the best input distribution; the channel law p(y|x) is fixed."}, {"m": "3A", "c": "Algorithm", "q": "What does the Blahut-Arimoto algorithm compute?", "a": "It iteratively computes the capacity-achieving input distribution (and capacity) of a discrete memoryless channel", "d": ["The optimal codebook for a given rate", "The minimum distance of a linear code", "The differential entropy of a continuous source"], "x": "Blahut-Arimoto alternates between updating the input distribution and the reverse channel, converging to the capacity-achieving p(x)."}, {"m": "3A", "c": "Intuition", "q": "At what crossover probability p does the BSC capacity equal zero?", "a": "p = 1/2", "d": ["p = 0", "p = 1", "p = 1/4"], "x": "At p = 1/2 the output is independent of the input (H₂(1/2)=1), so C = 1 - 1 = 0 and no information passes."}, {"m": "3A", "c": "Concept", "q": "A DMC is called 'memoryless' because:", "a": "Each output symbol depends only on the current input symbol, independent of past inputs/outputs", "d": ["The channel has no capacity", "The input alphabet has only two symbols", "The transition probabilities change over time"], "x": "Memoryless means p(yⁿ|xⁿ) = Π p(yᵢ|xᵢ); the channel acts independently on each symbol."}, {"m": "3B", "c": "Rate definition", "q": "For a code using M codewords each of block length n, the rate R is defined as:", "a": "R = log₂(M)/n bits per channel use", "d": ["R = M/n codewords per symbol", "R = n/log₂(M) channel uses per bit", "R = log₂(n)/M bits per codeword"], "x": "With M codewords you convey log₂(M) bits, spread over n channel uses, so R = log₂(M)/n bits per use."}, {"m": "3B", "c": "Main theorem", "q": "The noisy-channel coding theorem states that reliable communication (arbitrarily small error) is possible if and only if:", "a": "R &lt; C, where C is the channel capacity", "d": ["R &gt; C, exceeding capacity to overcome noise", "R = C exactly, matching the capacity", "R &lt; H(X), below the source entropy"], "x": "Shannon's theorem: any rate below capacity C is achievable with vanishing error; any rate above C cannot be reliable."}, {"m": "3B", "c": "Random coding", "q": "In the random coding argument, codewords are generated by drawing symbols i.i.d. from a distribution p(x). The capacity-achieving choice maximizes:", "a": "the mutual information I(X;Y) over input distributions p(x)", "d": ["the entropy H(X) of the input alphabet", "the conditional entropy H(Y|X) of the channel", "the Kullback-Leibler divergence KL(p‖q)"], "x": "C = max over p(x) of I(X;Y); generating the random codebook from the maximizing p(x) achieves rates up to C."}, {"m": "3B", "c": "Jointly-typical decoding", "q": "In jointly-typical decoding, the receiver declares codeword ŵ was sent if:", "a": "it is the unique codeword jointly typical with the received sequence yⁿ", "d": ["it has the smallest Hamming distance to yⁿ", "it maximizes the prior probability p(w)", "it minimizes the entropy H(X|Y)"], "x": "The decoder searches for the one codeword whose (xⁿ,yⁿ) pair lies in the jointly-typical set; ambiguity or no match is an error."}, {"m": "3B", "c": "Converse / Fano", "q": "In the converse proof, Fano's inequality bounds the conditional entropy H(W|Ŵ) of the message given the estimate in terms of:", "a": "the probability of error Pₑ (giving H(W|Ŵ) ≤ 1 + Pₑ·log₂(|W|))", "d": ["the channel capacity C alone", "the block length n only", "the input entropy H(X) only"], "x": "Fano: H(W|Ŵ) ≤ H(Pₑ) + Pₑ·log₂(|W|−1); if Pₑ→0 then little uncertainty remains, which forces R ≤ C."}, {"m": "3B", "c": "Rate cliff", "q": "The 'sharp threshold' (rate cliff) at capacity refers to the behavior that, as block length n → ∞:", "a": "error → 0 for any R &lt; C but error is bounded away from 0 (→ 1) for R &gt; C", "d": ["error decreases smoothly and linearly as R grows past C", "error stays constant for all rates regardless of C", "error → 0 for all rates given enough block length"], "x": "Reliability collapses abruptly at C: below it error vanishes, above it error is forced high, with no gradual transition in the limit."}, {"m": "3C", "c": "Differential entropy", "q": "For a continuous random variable X with density f, differential entropy h(X) is defined as:", "a": "−∫ f(x) log₂ f(x) dx", "d": ["−Σ f(x) log₂ f(x) over all x", "+∫ f(x) log₂ f(x) dx", "∫ f(x)² log₂ f(x) dx"], "x": "Differential entropy replaces the sum in discrete entropy with an integral over the density: h(X) = −∫ f(x) log₂ f(x) dx."}, {"m": "3C", "c": "Gaussian entropy", "q": "The differential entropy of a Gaussian X ~ N(μ, σ²) in bits is:", "a": "½ log₂(2πe σ²)", "d": ["½ log₂(2π σ²)", "log₂(2πe σ²)", "½ log₂(2πe σ)"], "x": "h(X) = ½ log₂(2πe σ²). It depends only on the variance σ², not the mean μ."}, {"m": "3C", "c": "Max-entropy principle", "q": "Among all continuous distributions with a fixed variance σ², which one MAXIMIZES differential entropy?", "a": "The Gaussian (normal) distribution", "d": ["The uniform distribution", "The Laplace (double-exponential) distribution", "The exponential distribution"], "x": "For a fixed variance, the Gaussian has the largest differential entropy. This is why worst-case (capacity-limiting) noise is often modeled as Gaussian."}, {"m": "3C", "c": "AWGN capacity", "q": "The capacity of an AWGN channel with signal-to-noise ratio SNR (per use, in bits) is:", "a": "C = ½ log₂(1 + SNR)", "d": ["C = log₂(1 + SNR)", "C = ½ log₂(SNR)", "C = ½ (1 + log₂ SNR)"], "x": "C = ½ log₂(1 + SNR) bits per channel use, where SNR = P/N (signal power over noise power)."}, {"m": "3C", "c": "Shannon–Hartley", "q": "In the Shannon–Hartley formula C = B log₂(1 + S/N), what does B represent?", "a": "The channel bandwidth in Hz", "d": ["The number of bits per symbol", "The noise power spectral density", "The signal-to-noise ratio in decibels"], "x": "C = B log₂(1 + S/N) gives capacity in bits per second; B is bandwidth in Hz. The ½ from the per-use formula is absorbed via the 2B Nyquist sample rate."}, {"m": "3C", "c": "Water-filling", "q": "In water-filling over parallel Gaussian channels, the optimal power allocated to sub-channel i with noise Nᵢ is:", "a": "Pᵢ = max(0, ν − Nᵢ) for a constant water level ν", "d": ["Pᵢ = ν + Nᵢ for a constant ν", "Pᵢ proportional to Nᵢ", "Pᵢ = ν · Nᵢ for a constant ν"], "x": "Power is allocated as Pᵢ = (ν − Nᵢ)⁺, pouring power into the lowest-noise channels first; channels with Nᵢ ≥ ν get zero power. ν is set so Σ Pᵢ = P."}, {"m": "4A", "c": "Concept", "q": "In a binary linear (n,k) code, the codewords form a k-dimensional subspace of GF(2)ⁿ. How many codewords does the code contain?", "a": "2^k", "d": ["2^n", "2^(n-k)", "n·k"], "x": "A k-dimensional subspace over GF(2) has exactly 2^k vectors, one for each combination of the k information bits."}, {"m": "4A", "c": "Equation", "q": "For a code with minimum Hamming distance d, how many errors can it guarantee to correct?", "a": "⌊(d-1)/2⌋", "d": ["d-1", "⌊d/2⌋", "d"], "x": "Spheres of radius t around codewords stay disjoint when 2t+1 ≤ d, giving t = ⌊(d-1)/2⌋. It can detect d-1 errors."}, {"m": "4A", "c": "Algorithm", "q": "In syndrome decoding of a linear code with parity-check matrix H, the syndrome s of a received word r is computed as:", "a": "s = H·rᵀ", "d": ["s = G·rᵀ", "s = r·Hᵀ·H", "s = r·Gᵀ"], "x": "The syndrome s = H·rᵀ depends only on the error pattern (H·cᵀ = 0 for codewords), indexing the error coset independently of the sent codeword."}, {"m": "4A", "c": "Concept", "q": "What are the parameters (n, k, d) of the standard binary Hamming code?", "a": "(7, 4, 3)", "d": ["(7, 3, 4)", "(8, 4, 4)", "(15, 4, 3)"], "x": "The Hamming(7,4) code encodes 4 data bits into 7 bits with minimum distance 3, so it corrects any single-bit error."}, {"m": "4A", "c": "Equation", "q": "The Hamming (sphere-packing) bound for a binary t-error-correcting code of length n states that:", "a": "2^k · Σ_{i=0}^{t} C(n,i) ≤ 2^n", "d": ["2^k · Σ_{i=0}^{t} C(n,i) ≥ 2^n", "2^k + Σ_{i=0}^{t} C(n,i) ≤ 2^n", "k · Σ_{i=0}^{t} C(n,i) ≤ n"], "x": "Each of the 2^k codewords owns a disjoint Hamming ball of size Σ C(n,i); these balls cannot exceed the 2^n total space."}, {"m": "4A", "c": "Intuition", "q": "Why is the all-zero vector always a codeword of any linear code?", "a": "A linear code is a vector subspace, which must contain the zero vector", "d": ["Because every code reserves 0 as a sync marker", "Because the generator matrix has a zero row", "Only systematic codes contain the all-zero word"], "x": "Linearity means codewords are closed under addition; a subspace necessarily includes the additive identity 0."}, {"m": "4A", "c": "Weakness", "q": "A perfect code meets the Hamming bound with equality. Which of these is a perfect code?", "a": "The binary Hamming(7,4) code", "d": ["Every Reed-Solomon code", "The (8,4) extended Hamming code", "Every convolutional code"], "x": "Hamming codes (and the Golay codes) achieve the sphere-packing bound exactly: their radius-1 balls tile the space with no leftover words."}, {"m": "4B", "c": "Concept", "q": "How is the finite field GF(2^m) typically constructed?", "a": "As polynomials over GF(2) modulo an irreducible degree-m polynomial", "d": ["As integers modulo the prime 2^m", "As the set {0,1,...,2^m−1} under ordinary integer arithmetic", "As m independent copies of GF(2) with componentwise multiplication"], "x": "GF(2^m) consists of degree-&lt;m polynomials over GF(2), with multiplication reduced modulo a fixed irreducible polynomial; 2^m must be a prime power, not prime, so modular integer arithmetic fails."}, {"m": "4B", "c": "Equation", "q": "Reed-Solomon codes are MDS, meaning their minimum distance for an (n,k) code equals:", "a": "d = n − k + 1", "d": ["d = n − k", "d = ⌊(n−k)/2⌋", "d = k + 1"], "x": "MDS codes meet the Singleton bound d ≤ n − k + 1 with equality, giving the largest possible distance for given n and k."}, {"m": "4B", "c": "Concept", "q": "Which property defines a cyclic code?", "a": "Every cyclic shift of a codeword is also a codeword", "d": ["Every codeword has even weight", "The generator matrix is the identity", "All codewords have the same Hamming weight"], "x": "Cyclic codes are closed under cyclic shifts; algebraically their codewords are multiples of a generator polynomial g(x) that divides x^n − 1."}, {"m": "4B", "c": "Algorithm", "q": "In algebraic decoding of BCH/RS codes, what is the role of the Berlekamp-Massey algorithm?", "a": "It finds the shortest error-locator polynomial (LFSR) consistent with the syndromes", "d": ["It evaluates the message polynomial at the code locators", "It performs the FFT used to encode the data", "It computes the channel capacity of the link"], "x": "Berlekamp-Massey synthesizes the minimal LFSR matching the syndrome sequence, yielding the error-locator polynomial whose roots give error positions."}, {"m": "4B", "c": "Concept", "q": "For an (n,k) Reed-Solomon code with d = n−k+1, how many erasures alone can it correct?", "a": "Up to n − k erasures", "d": ["Up to ⌊(n−k)/2⌋ erasures", "Up to n − k − 1 erasures", "Up to 2(n−k) erasures"], "x": "With erasures, only the values (not locations) are unknown, so the full distance budget applies: up to d−1 = n−k erasures."}, {"m": "4B", "c": "Intuition", "q": "Why can a code correct twice as many erasures as errors?", "a": "Erasure positions are known, so only the symbol values must be recovered", "d": ["Erasures change two symbols each while errors change one", "Erasures only occur in even-length bursts", "The decoder ignores erasures entirely"], "x": "An unknown error costs distance for both its location and value; a known-location erasure costs only for its value, so 2·errors + erasures ≤ d−1."}, {"m": "4B", "c": "Concept", "q": "Reed-Solomon codes are widely deployed in which of the following applications?", "a": "QR codes, CDs/DVDs, and deep-space communication", "d": ["TCP/IP checksums and Ethernet CRCs only", "Symmetric encryption like AES", "Hash functions such as SHA-256"], "x": "RS codes handle burst errors and erasures, making them standard in optical media, 2D barcodes, storage, and space links."}, {"m": "4C", "c": "Encoder structure", "q": "A rate-1/2 convolutional encoder is built from a shift register with 2 memory elements (constraint length K=3). How many states does its trellis have?", "a": "4", "d": ["2", "8", "3"], "x": "The number of trellis states equals 2^(memory) = 2^2 = 4. Memory is the number of storage elements, not the constraint length K=3."}, {"m": "4C", "c": "Encoder properties", "q": "What key property distinguishes a convolutional encoder from a block encoder?", "a": "Output depends on the current input plus stored previous inputs (memory)", "d": ["It maps each k-bit block independently with no memory", "It requires the entire message before producing any output", "It can only correct erasures, not bit errors"], "x": "A convolutional encoder has memory: each output is a function of the current input bits and the contents of the shift register, so outputs depend on a sliding window of past inputs."}, {"m": "4C", "c": "Viterbi decoding", "q": "The Viterbi algorithm performs maximum-likelihood decoding of a convolutional code. What does it find on the trellis?", "a": "The single path with the best (minimum) accumulated metric to the received sequence", "d": ["The per-symbol posterior probability of each information bit", "All paths whose metric is below a fixed threshold", "The path that maximizes the code rate"], "x": "Viterbi is a dynamic-programming search that keeps one survivor path per state and returns the globally most likely (ML) codeword sequence."}, {"m": "4C", "c": "Viterbi metrics", "q": "With hard-decision Viterbi decoding over a binary symmetric channel, what branch metric is typically used?", "a": "Hamming distance between the received bits and the branch's expected output", "d": ["Euclidean distance between real-valued samples", "Mutual information I(X;Y) per branch", "The syndrome weight of the branch"], "x": "For hard decisions on a BSC, minimizing total Hamming distance is equivalent to ML decoding. Soft-decision Viterbi instead uses (squared) Euclidean distance on the analog samples."}, {"m": "4C", "c": "BCJR / MAP", "q": "How does the BCJR (MAP) algorithm differ from the Viterbi algorithm?", "a": "BCJR computes per-bit a posteriori probabilities (soft outputs); Viterbi finds the single ML sequence", "d": ["BCJR is faster because it only does a forward pass", "Viterbi gives soft outputs while BCJR gives hard outputs", "BCJR ignores the channel and only uses the code structure"], "x": "BCJR uses forward (α) and backward (β) recursions plus branch metrics (γ) to compute the marginal posterior of each bit, giving soft information needed for iterative decoding. Viterbi optimizes the whole sequence, not per-bit marginals."}, {"m": "4C", "c": "Turbo codes", "q": "What architectural feature is central to a classic turbo code?", "a": "Two convolutional encoders joined by an interleaver, decoded iteratively with exchanged soft information", "d": ["A single very-long-constraint-length encoder decoded by brute force", "A block code concatenated with a Hamming code and no feedback", "An encoder with no memory but a very low rate"], "x": "Turbo codes use parallel-concatenated recursive convolutional encoders separated by an interleaver; two soft-in/soft-out (e.g. BCJR) decoders iteratively exchange extrinsic information, achieving near-Shannon-limit performance."}, {"m": "4C", "c": "Iterative decoding", "q": "In turbo decoding, what information do the two component decoders exchange each iteration?", "a": "Extrinsic (soft) information, typically as log-likelihood ratios", "d": ["Final hard-decision bits only", "The interleaver permutation table", "The encoder's generator polynomials"], "x": "Each SISO decoder passes extrinsic LLRs (its own new soft estimate, excluding the input it received) to the other decoder, which uses it as a priori information. Iterating refines the estimates."}, {"m": "4D", "c": "LDPC structure", "q": "What makes a parity-check matrix H 'low-density' in LDPC codes?", "a": "H has very few 1s — the number of nonzero entries grows roughly linearly with block length (each row/column has small, bounded weight)", "d": ["H is a square invertible matrix with full rank", "H has more rows than columns to add redundancy", "H contains only entries on its main diagonal"], "x": "LDPC = Low-Density Parity-Check: H is sparse, so the average number of 1s per row and per column stays small (constant) even as the code length n grows."}, {"m": "4D", "c": "Tanner graph", "q": "In a Tanner graph for an LDPC code, what do the two types of nodes represent?", "a": "Variable (bit) nodes for codeword symbols and check (constraint) nodes for parity-check equations, with an edge wherever H has a 1", "d": ["Encoder nodes and decoder nodes connected by the channel", "Source nodes and sink nodes in a flow network", "Systematic bits and parity bits with no edges between them"], "x": "A Tanner graph is bipartite: variable node j connects to check node i exactly when H[i,j]=1. The girth (shortest cycle) affects decoding performance."}, {"m": "4D", "c": "BP decoding", "q": "Belief-propagation (sum-product) decoding on a Tanner graph computes what, and when is it exact?", "a": "It iteratively passes probabilistic messages (beliefs) along edges to approximate per-bit marginal posteriors; it is exact only when the graph is a tree (cycle-free)", "d": ["It finds the exact maximum-likelihood codeword in all cases in one pass", "It Gaussian-eliminates H and is always exact", "It computes the syndrome only, never the bit marginals"], "x": "Sum-product passes messages between variable and check nodes. On loopy graphs it is approximate; on cycle-free (tree) graphs the marginals it computes are exact."}, {"m": "4D", "c": "Density evolution", "q": "What does density evolution track to predict the asymptotic behavior of an LDPC code ensemble?", "a": "The evolution of the probability distribution of the BP messages over iterations, to find the threshold below which the error probability → 0", "d": ["The exact bit positions that will be in error after decoding", "The number of 1s added to H at each decoding iteration", "The Hamming distance between the transmitted and received word"], "x": "Density evolution analyzes how the message distributions change per iteration (for an infinite-length ensemble), yielding a noise threshold separating reliable from unreliable regions."}, {"m": "4D", "c": "Polar codes", "q": "What is the core phenomenon — channel polarization — exploited by polar codes?", "a": "Combining and splitting copies of a channel produces synthesized subchannels that polarize toward either nearly noiseless or nearly useless as N grows", "d": ["All synthesized subchannels converge to the same average capacity", "The channel capacity is doubled by repeated XOR combining", "Noise is spread evenly so every subchannel becomes mediocre"], "x": "Arıkan's polarization: recursive transforms make a fraction (≈ capacity) of subchannels nearly perfect; information bits go on those, frozen bits on the bad ones."}, {"m": "4D", "c": "Fountain/LT codes", "q": "What is the defining 'rateless' property of fountain (e.g. LT) codes?", "a": "The encoder can generate a limitless stream of encoded symbols, and a receiver can recover the k source symbols from any slightly-more-than-k received symbols, regardless of which ones", "d": ["They have a single fixed code rate chosen before transmission", "They require the receiver to specify exactly which symbols to send", "They only work on the binary symmetric channel with a fixed rate"], "x": "Fountain codes are rateless: each output symbol is an XOR of a random subset of inputs (degree from a distribution like Robust Soliton), so any ≈k(1+ε) symbols suffice to decode."}, {"m": "5A", "c": "Concept", "q": "What does the rate-distortion function R(D) represent?", "a": "The minimum number of bits per symbol needed to describe a source so that the reconstruction has average distortion at most D", "d": ["The maximum distortion achievable when transmitting at rate D bits per symbol", "The channel capacity needed to transmit a source losslessly within distortion D", "The entropy of the source minus the distortion D measured in bits"], "x": "R(D) is the infimum of rates achievable for a given distortion level D; it is the lossy analog of entropy."}, {"m": "5A", "c": "Equation", "q": "For a Bernoulli(p) source with p ≤ 1/2 under Hamming distortion, what is R(D) for 0 ≤ D ≤ p?", "a": "R(D) = H₂(p) − H₂(D)", "d": ["R(D) = H₂(p) + H₂(D)", "R(D) = H₂(D) − H₂(p)", "R(D) = ½ log₂(p/D)"], "x": "The rate is the source entropy H₂(p) reduced by the entropy H₂(D) that the allowed distortion lets us discard; R(D)=0 once D ≥ p."}, {"m": "5A", "c": "Equation", "q": "For a Gaussian source N(0,σ²) under squared-error distortion, what is R(D) for 0 ≤ D ≤ σ²?", "a": "R(D) = ½ log₂(σ²/D)", "d": ["R(D) = ½ log₂(D/σ²)", "R(D) = log₂(σ²/D)", "R(D) = ½ log₂(σ² − D)"], "x": "Each halving of allowed distortion D costs exactly ½ bit; R(D)=0 once D ≥ σ² (just send the mean)."}, {"m": "5A", "c": "Algorithm", "q": "In reverse water-filling for parallel independent Gaussian sources, how is the distortion Dᵢ for component i with variance σᵢ² assigned?", "a": "Dᵢ = min(λ, σᵢ²) for a common water level λ chosen so Σ Dᵢ = D", "d": ["Dᵢ = max(λ, σᵢ²) so loud components get more distortion", "Dᵢ = σᵢ² − λ for every component regardless of sign", "Dᵢ = λ·σᵢ² scaled proportionally to each variance"], "x": "Components with variance below the water level λ are not coded at all (Dᵢ=σᵢ²); those above are described down to distortion λ."}, {"m": "5A", "c": "Intuition", "q": "In reverse water-filling, what happens to a source component whose variance σᵢ² is below the water level λ?", "a": "It is not encoded at all and contributes its full variance σᵢ² as distortion", "d": ["It receives the most bits because it is the quietest component", "It is encoded down to distortion exactly λ like the others", "It is merged with the loudest component before coding"], "x": "Low-variance components are too quiet to be worth describing; reconstruction uses the mean and accepts distortion equal to their variance."}, {"m": "5A", "c": "Weakness", "q": "Which statement correctly contrasts lossy and lossless compression?", "a": "Lossless requires R ≥ H(X) for exact recovery, while lossy allows R(D) &lt; H(X) by tolerating distortion D &gt; 0", "d": ["Lossy compression always achieves a higher rate than lossless for the same source", "Lossless compression is a special case of lossy with D = σ²", "Lossy compression can recover the source exactly if R(D) ≥ H(X)"], "x": "Lossless coding needs at least H(X) bits; rate-distortion lets you go below H(X) precisely because exact recovery is abandoned. Lossless is the D→0 limit."}, {"m": "5B", "c": "Concept", "q": "In the method of types, how many distinct type classes are there for sequences of length n over an alphabet of size |X|?", "a": "At most (n+1)^|X|, which is polynomial in n", "d": ["Exactly |X|^n, one per sequence", "2^(nH) type classes", "n! / (n−|X|)! type classes"], "x": "Each type is determined by integer counts summing to n over |X| symbols, giving a polynomial (n+1)^|X| bound — far fewer than the exponentially many sequences."}, {"m": "5B", "c": "Equation", "q": "Sanov's theorem gives the exponent for the probability that the empirical type of i.i.d. samples from q falls in a set E. What is that exponent?", "a": "D(p*‖q), where p* is the distribution in E closest to q in KL divergence", "d": ["H(p*) − H(q), the entropy gap to the closest type", "D(q‖p*), the reverse KL from q to the closest type", "I(p*;q), the mutual information between p* and q"], "x": "Sanov: Q(E) ≈ 2^(−nD(p*‖q)); the dominant contribution comes from the I-projection p*, the member of E minimizing D(·‖q)."}, {"m": "5B", "c": "Equation", "q": "In the Stein lemma for binary hypothesis testing (H₁:p vs H₂:q), what is the best error exponent for the type-II error when the type-I error is held below ε?", "a": "D(p‖q)", "d": ["D(q‖p)", "H(p) − H(q)", "I(p;q)"], "x": "Stein's lemma: with type-I error bounded, the type-II error decays as 2^(−nD(p‖q)); the KL divergence is the optimal exponent."}, {"m": "5B", "c": "Equation", "q": "The Cramér-Rao bound lower-bounds the variance of an unbiased estimator θ̂ in terms of the Fisher information J(θ). What is the bound?", "a": "Var(θ̂) ≥ 1/J(θ)", "d": ["Var(θ̂) ≥ J(θ)", "Var(θ̂) ≤ 1/J(θ)", "Var(θ̂) ≥ 1/J(θ)²"], "x": "No unbiased estimator can have variance below the reciprocal of the Fisher information; higher Fisher information permits more precise estimation."}, {"m": "5B", "c": "Intuition", "q": "How is KL divergence D(p‖q) interpreted in terms of likelihood ratios?", "a": "It is the expected log-likelihood ratio E_p[log₂(p(X)/q(X))] under the true distribution p", "d": ["It is the variance of the log-likelihood ratio under q", "It is the expected log-likelihood ratio taken under q instead of p", "It is the maximum value of the log-likelihood ratio over all x"], "x": "D(p‖q) = Σ p(x) log₂(p(x)/q(x)) is exactly the mean log-likelihood ratio when data is generated by p, which is why it governs hypothesis-testing exponents."}, {"m": "5C", "c": "Concept", "q": "In Slepian-Wolf coding of correlated sources X and Y encoded separately but decoded jointly, what is the minimum total rate R₁+R₂?", "a": "R₁ + R₂ ≥ H(X,Y), the joint entropy", "d": ["R₁ + R₂ ≥ H(X) + H(Y), as if independent", "R₁ + R₂ ≥ H(X|Y) + H(Y|X)", "R₁ + R₂ ≥ I(X;Y)"], "x": "Remarkably, separate encoding with joint decoding achieves the joint entropy H(X,Y) — the same total as if the encoders could cooperate."}, {"m": "5C", "c": "Equation", "q": "Which set of constraints defines the Slepian-Wolf achievable rate region for sources X, Y?", "a": "R₁ ≥ H(X|Y), R₂ ≥ H(Y|X), and R₁ + R₂ ≥ H(X,Y)", "d": ["R₁ ≥ H(X), R₂ ≥ H(Y), and R₁ + R₂ ≥ H(X,Y)", "R₁ ≥ H(Y|X), R₂ ≥ H(X|Y), and R₁ + R₂ ≥ I(X;Y)", "R₁ ≥ H(X,Y), R₂ ≥ H(X,Y), and R₁ + R₂ ≥ 2H(X,Y)"], "x": "Each source needs at least its conditional entropy, and together they need the joint entropy; these three inequalities bound the pentagon-shaped region."}, {"m": "5C", "c": "Concept", "q": "For a two-user multiple-access channel (MAC), which constraint bounds the sum rate R₁+R₂?", "a": "R₁ + R₂ ≤ I(X₁,X₂ ; Y)", "d": ["R₁ + R₂ ≤ I(X₁;Y) + I(X₂;Y) always with equality", "R₁ + R₂ ≤ H(Y) − H(X₁,X₂)", "R₁ + R₂ ≤ min(I(X₁;Y), I(X₂;Y))"], "x": "The sum rate is limited by the mutual information between the joint input (X₁,X₂) and the output Y; individual rates are bounded by conditional mutual informations."}, {"m": "5C", "c": "Intuition", "q": "What is the defining feature of a broadcast channel?", "a": "A single sender transmits to two or more receivers over one shared channel, generally sending different messages to each", "d": ["Multiple senders transmit to a single common receiver", "Two senders and two receivers communicate over fully separate links", "A single sender and single receiver with feedback"], "x": "The broadcast channel has one input and multiple outputs; the challenge is serving receivers with differing channel qualities (e.g., via superposition coding), the dual of the MAC."}, {"m": "5C", "c": "Weakness", "q": "Why is the Slepian-Wolf result considered surprising?", "a": "Separate encoders, unaware of each other's data, achieve the same total rate H(X,Y) as a single joint encoder would", "d": ["It shows correlated sources require more rate than independent ones", "It proves that joint decoding is always worse than separate decoding", "It requires the encoders to exchange their data before transmitting"], "x": "Intuition suggests separate encoding wastes the correlation, but Slepian-Wolf shows joint decoding recovers it fully — no rate penalty for distributed encoding."}, {"m": "6A", "c": "Concept", "q": "When training a classifier with one-hot labels, minimizing the cross-entropy loss H(p,q) between the empirical label distribution p and the model q is equivalent to minimizing which quantity?", "a": "KL(p‖q) — because the entropy H(p) of the fixed empirical labels is constant, so H(p,q) = H(p) + KL(p‖q) differs from KL only by a constant", "d": ["KL(q‖p) — the reverse KL, since the model distribution is what we optimize", "The entropy H(q) of the model's predictions", "The mutual information I(p;q) between labels and predictions"], "x": "Cross-entropy decomposes as H(p,q) = H(p) + KL(p‖q). With p fixed (the data), H(p) is constant, so minimizing cross-entropy minimizes the forward KL(p‖q)."}, {"m": "6A", "c": "Equation", "q": "Maximum-likelihood estimation can be cast as an information-theoretic objective. What does MLE minimize?", "a": "KL(p̂‖q_θ), the KL from the empirical data distribution p̂ to the model q_θ", "d": ["KL(q_θ‖p̂), the KL from the model to the empirical distribution", "The entropy H(p̂) of the empirical distribution", "The cross-entropy H(q_θ) of the model with itself"], "x": "Maximizing average log-likelihood (1/n)Σ log q_θ(xᵢ) equals minimizing the cross-entropy of p̂ relative to q_θ, which (since H(p̂) is fixed) equals minimizing KL(p̂‖q_θ)."}, {"m": "6A", "c": "Concept", "q": "Label smoothing replaces a one-hot target with a target that puts (1−ε) on the true class and spreads ε over the others. From a maximum-entropy viewpoint, what is its effect?", "a": "It raises the entropy of the target distribution, discouraging the model from producing over-confident (near-zero/near-one) probabilities", "d": ["It lowers the target entropy, forcing sharper, more confident predictions", "It changes the loss from cross-entropy to mean-squared error", "It removes the need for the softmax normalization in the output layer"], "x": "A smoothed target has higher entropy than a one-hot vector; minimizing cross-entropy to it penalizes extreme logits, improving calibration and acting as a regularizer."}, {"m": "6A", "c": "Concept", "q": "The maximum-entropy principle says: among all distributions consistent with given constraints, choose the one with the highest entropy. With constraints fixing certain expected feature values E[fₖ(x)], what family of distributions does this yield?", "a": "An exponential family, q(x) ∝ exp(Σₖ λₖ fₖ(x)), with the λₖ as Lagrange multipliers tuned to match the constraints", "d": ["Always a Gaussian distribution regardless of the constraints", "A uniform distribution over the support, ignoring the constraints", "A mixture of delta functions placed at the constraint values"], "x": "Maximizing entropy subject to linear moment constraints via Lagrange multipliers gives the exponential family form q(x) ∝ exp(Σ λₖ fₖ(x)); the specific member depends on which moments are constrained."}, {"m": "6A", "c": "Intuition", "q": "Why are softmax (multinomial logistic) regression models naturally described as maximum-entropy models?", "a": "They are the maximum-entropy conditional distributions p(y|x) subject to matching the empirical expectations of the input features for each class", "d": ["Because the softmax always outputs a uniform distribution, the highest-entropy distribution possible", "Because they minimize entropy rather than maximize it, producing peaked outputs", "Because logistic regression assumes the inputs are Gaussian-distributed"], "x": "Softmax/logistic regression is exactly the maxent conditional model under feature-expectation constraints; the log-linear (exponential-family) form follows from the maxent derivation."}, {"m": "6A", "c": "Weakness", "q": "Forward KL(p‖q) (as minimized by MLE/cross-entropy) and reverse KL(q‖p) behave differently. What is a characteristic behavior of minimizing forward KL(p‖q)?", "a": "It is 'mean-seeking' / zero-avoiding: q is penalized heavily wherever p has mass but q does not, so q tends to cover all modes of p", "d": ["It is 'mode-seeking': q collapses onto a single mode of p and ignores the rest", "It is symmetric, so forward and reverse KL give identical optima", "It ignores regions where p is large, focusing only on where q is large"], "x": "Forward KL(p‖q)=Σ p log(p/q) blows up where p&gt;0 but q≈0, so the optimizer spreads q to cover all of p's support (mean-seeking), unlike the mode-seeking reverse KL."}, {"m": "6B", "c": "Concept", "q": "In the Minimum Description Length (MDL) principle's two-part code, the total description length to be minimized is the sum of which two terms?", "a": "L(model) + L(data | model): the bits to encode the model (hypothesis) plus the bits to encode the data given that model", "d": ["L(data) + L(model | data): the bits for the raw data plus the bits for the model given the data", "L(model) − L(data | model): the model cost minus the residual coding cost", "L(data | model) only: the model itself is assumed free to transmit"], "x": "Two-part MDL picks the model minimizing L(model)+L(data|model). The first term penalizes complexity, the second rewards fit, formalizing the trade-off."}, {"m": "6B", "c": "Intuition", "q": "How does the MDL two-part code formalize Occam's razor?", "a": "A more complex model costs more bits to describe (larger L(model)), so it must repay that cost with a large enough reduction in L(data|model) to be worth selecting", "d": ["It forbids any model with more than a fixed number of parameters", "It always selects the model with the lowest training error regardless of size", "It assigns equal description length to all models, then picks the best fit"], "x": "MDL automatically balances fit against complexity: simpler hypotheses are preferred unless extra complexity yields enough compression of the data, encoding Occam's razor in bits."}, {"m": "6B", "c": "Equation", "q": "The Bayesian Information Criterion (BIC) for a model with k parameters and n data points is −2 log L̂ + k·log n. How does its complexity penalty compare to AIC's 2k penalty as n grows?", "a": "BIC's penalty k·log n grows with sample size, so for large n it penalizes complexity more heavily than AIC and tends to select simpler models", "d": ["BIC's penalty is always smaller than AIC's, so BIC favors more complex models", "BIC and AIC use identical penalties; only the likelihood term differs", "BIC's penalty shrinks as n grows, eventually ignoring model complexity"], "x": "AIC uses a fixed 2k penalty; BIC uses k·log n, which exceeds 2k once n&gt;e²≈7.4, so BIC is more conservative and is a coarse approximation to the Bayesian marginal likelihood."}, {"m": "6B", "c": "Concept", "q": "MDL is closely tied to Kolmogorov complexity. What is the key relationship, and why isn't Kolmogorov complexity used directly?", "a": "MDL approximates the idea of the shortest program describing the data, but Kolmogorov complexity is uncomputable, so MDL uses a restricted, computable model class as the 'language'", "d": ["MDL and Kolmogorov complexity are identical and both are easily computable", "Kolmogorov complexity is a special case of MDL restricted to linear models", "MDL ignores Kolmogorov complexity entirely; the two are unrelated"], "x": "Kolmogorov complexity (shortest program reproducing the data) is the idealized description length but is uncomputable; MDL makes it practical by fixing a computable model/code family."}, {"m": "6B", "c": "Concept", "q": "The 'bits-back' argument shows that a two-part code can be wasteful. What inefficiency does bits-back recover?", "a": "The bits 'wasted' in choosing which specific parameters/latents to encode can be recovered as extra information transmitted, lowering the effective description length toward the Bayesian marginal", "d": ["It recovers the bits lost to floating-point rounding in the likelihood", "It recovers bits by deleting the model term entirely from the two-part code", "It recovers bits only when the data are perfectly noise-free"], "x": "Bits-back exploits the freedom in choosing latents/parameters from a posterior: the auxiliary randomness used to pick them carries information that is later recovered, tightening the code length to the variational free energy."}, {"m": "6B", "c": "Weakness", "q": "How do MDL, BIC, and full Bayesian model selection relate?", "a": "BIC is an asymptotic (large-n) approximation to the Bayesian marginal likelihood, and refined/normalized-maximum-likelihood MDL coincides with Bayes more closely; all penalize complexity but with different rigor", "d": ["They are three names for exactly the same formula with identical numerical results", "MDL and Bayes are unrelated; only BIC connects to probability theory", "Full Bayes ignores complexity, while MDL and BIC are the only ones that penalize it"], "x": "BIC drops out of a Laplace approximation to the Bayesian evidence; modern MDL (NML / two-part refinements) aligns with Bayesian marginal likelihood, so all three are complexity-penalizing relatives rather than identical rules."}, {"m": "6C", "c": "Equation", "q": "The Information Bottleneck objective seeks a representation T of input X that is useful for predicting Y. Which Lagrangian does IB minimize?", "a": "min I(X;T) − β·I(T;Y): compress X into T (small I(X;T)) while keeping T predictive of Y (large I(T;Y)), traded off by β", "d": ["min I(T;Y) − β·I(X;T): maximize compression while discarding relevance", "max I(X;T) + β·I(T;Y): make T retain as much of X and Y as possible", "min I(X;Y) − β·I(X;T): compress the raw input-output dependence"], "x": "IB minimizes I(X;T) − β·I(T;Y); the first term squeezes out information about X (compression), the second preserves information about Y (relevance), with β setting the trade-off."}, {"m": "6C", "c": "Concept", "q": "On the IB 'information plane', what are the two axes used to visualize a layer's representation T during training?", "a": "I(X;T) on one axis (how much input information T retains) and I(T;Y) on the other (how much label-relevant information T retains)", "d": ["Training loss on one axis and epoch number on the other", "The number of neurons vs. the learning rate", "I(X;Y) vs. I(T;T), the self-information of the representation"], "x": "The information plane plots each layer as a point (I(X;T), I(T;Y)), letting you watch how compression and relevance evolve over training."}, {"m": "6C", "c": "Concept", "q": "What is the two-phase 'fitting-then-compression' story proposed by Shwartz-Ziv &amp; Tishby for deep network training?", "a": "An initial fitting phase where both I(X;T) and I(T;Y) increase, followed by a longer compression phase where I(X;T) decreases (T discards irrelevant input information) while I(T;Y) stays high", "d": ["A phase where I(T;Y) decreases first, then I(X;T) increases to memorize the data", "Both quantities decrease monotonically throughout training", "A single phase in which I(X;T) and I(T;Y) stay constant after initialization"], "x": "Shwartz-Ziv &amp; Tishby reported a short fitting phase (both MIs rise) then an extended compression phase (I(X;T) falls), which they linked to generalization and SGD noise."}, {"m": "6C", "c": "Weakness", "q": "What was the main caveat raised by Saxe et al. about the compression phase of the IB story?", "a": "The observed compression depends on saturating nonlinearities (e.g. tanh) and on how MI is estimated; with ReLU and linear nets compression often does not appear, so it isn't a universal feature of deep learning", "d": ["They confirmed compression always occurs and is required for any generalization", "They showed compression only happens with cross-entropy loss, never with MSE", "They proved I(X;T) is infinite for deterministic networks, so the plane is meaningless"], "x": "Saxe et al. found the compression phase is an artifact of double-sided saturating activations and binning-based MI estimates; ReLU networks generalize without it, undercutting compression as the cause of generalization."}, {"m": "6C", "c": "Algorithm", "q": "The Deep Variational Information Bottleneck (VIB) makes IB tractable for deep nets. What does it do?", "a": "It optimizes a variational lower bound on I(T;Y) and a variational upper bound on I(X;T), yielding a tractable objective trained with the reparameterization trick (closely resembling a β-VAE-style loss)", "d": ["It computes I(X;T) and I(T;Y) exactly via histogram binning of activations", "It replaces mutual information with the Euclidean distance between X and T", "It removes the encoder and trains only a decoder on raw inputs"], "x": "VIB bounds the intractable MI terms variationally (lower bound on relevance, upper bound on compression via a prior), giving a differentiable objective optimized with stochastic encoders and reparameterization."}, {"m": "6D", "c": "Concept", "q": "Why is mutual information notoriously hard to estimate from samples in high dimensions?", "a": "MI requires knowing density ratios / the joint and marginal densities; with limited samples in high dimensions these are very hard to estimate, and estimators suffer high variance and bias", "d": ["MI is trivial to estimate; it equals the sample correlation coefficient", "MI is impossible only because it is always infinite for continuous variables", "MI estimation is easy but slow; the only issue is computational cost"], "x": "MI depends on the (often high-dimensional) joint and marginal densities or their ratio; sample-based estimation is data-hungry and prone to large bias/variance, motivating variational lower bounds."}, {"m": "6D", "c": "Equation", "q": "The MINE estimator is built on which variational representation of mutual information?", "a": "The Donsker-Varadhan (DV) representation: I(X;Y) ≥ E_p(x,y)[T(x,y)] − log E_p(x)p(y)[e^{T(x,y)}], maximized over a neural critic T", "d": ["The chain rule I(X;Y) = H(X) − H(X|Y), estimated by two separate entropy nets", "The data-processing inequality I(X;Y) ≥ I(X;f(Y))", "Fano's inequality relating MI to classification error"], "x": "MINE (Mutual Information Neural Estimation) maximizes the Donsker-Varadhan lower bound over a neural statistics network T, giving a trainable estimate of MI."}, {"m": "6D", "c": "Weakness", "q": "InfoNCE (the contrastive bound used in representation learning) has a well-known limitation on the MI it can certify. What is it?", "a": "Its estimate is upper-bounded by log N, where N is the number of (positive+negative)
